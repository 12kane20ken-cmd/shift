<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>シフト作成</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    background: #F5F6F8;
    color: #1F2937;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }

  /* Header */
  .header {
    background: #FFFFFF;
    border-bottom: 1px solid #E5E7EB;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-size: 16px; font-weight: 700; color: #111827; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button {
    background: #FFFFFF; border: 1px solid #D1D5DB;
    width: 28px; height: 28px; border-radius: 4px;
    color: #6B7280; font-size: 14px;
  }
  .month-label {
    font-size: 15px; font-weight: 600; color: #111827;
    min-width: 110px; text-align: center;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px; border-radius: 4px;
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
  }
  .btn-primary { background: #2563EB; color: #FFF; }
  .btn-primary:hover { background: #1D4ED8; }
  .btn-secondary { background: #FFF; border-color: #D1D5DB; color: #374151; }
  .btn-secondary:hover { background: #F9FAFB; }
  .btn-danger { background: #DC2626; color: #FFF; }
  .btn-danger:hover { background: #B91C1C; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 57px);
  }

  /* Sidebar */
  .sidebar {
    background: #FFFFFF;
    border-right: 1px solid #E5E7EB;
    overflow-y: auto;
    padding: 16px;
  }
  .section { margin-bottom: 20px; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 11px; font-weight: 700; color: #6B7280;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .add-btn {
    background: none; border: none; color: #2563EB;
    font-size: 18px; line-height: 1; padding: 0 4px;
  }
  .category-label {
    font-size: 11px; font-weight: 700; color: #374151;
    margin: 12px 0 6px; padding-bottom: 4px;
    border-bottom: 1px solid #E5E7EB;
  }
  .category-label:first-child { margin-top: 0; }
  .staff-card {
    background: #F9FAFB; border: 1px solid #E5E7EB;
    border-radius: 4px; padding: 8px 10px; margin-bottom: 6px;
    cursor: pointer; position: relative;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  .staff-card:hover { background: #F3F4F6; }
  .staff-card.drag-source { opacity: 0.35; }
  .staff-card.drop-before { box-shadow: 0 -3px 0 0 #2563EB; }
  .staff-card.drop-after { box-shadow: 0 3px 0 0 #2563EB; }
  .staff-name {
    font-weight: 600; font-size: 13px; color: #111827;
    margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
  }
  .group-tag {
    font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 700;
  }
  .staff-meta { font-size: 11px; color: #6B7280; }
  .group-card {
    background: #F9FAFB; border: 1px solid #E5E7EB;
    border-radius: 4px; padding: 8px 10px; margin-bottom: 6px;
    cursor: pointer;
  }
  .group-card:hover { background: #F3F4F6; }
  .group-name {
    font-weight: 600; font-size: 12px; color: #111827;
    margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
  }
  .group-swatch {
    width: 10px; height: 10px; border-radius: 2px; display: inline-block;
  }
  .group-members { font-size: 11px; color: #6B7280; }
  .empty-msg { font-size: 12px; color: #9CA3AF; padding: 8px 0; font-style: italic; }

  /* Main content */
  .content { overflow: auto; padding: 20px 24px; }

  .violations {
    background: #FFFFFF;
    border: 1px solid #FCA5A5;
    border-left: 3px solid #DC2626;
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .violations.hidden { display: none; }
  .violations-header {
    font-size: 12px; font-weight: 700; color: #991B1B;
    margin-bottom: 8px;
  }
  .violations-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 4px 16px;
    font-size: 12px;
    color: #7F1D1D;
  }
  .violation-item::before {
    content: "・"; color: #DC2626; font-weight: 700; margin-right: 2px;
  }

  /* Calendar */
  .calendar-wrap {
    background: #FFFFFF;
    border: 1px solid #E5E7EB;
    border-radius: 4px;
    overflow: auto;
    max-height: calc(100vh - 200px);
  }
  table.calendar { border-collapse: separate; border-spacing: 0; font-size: 11px; width: 100%; }
  .calendar th, .calendar td {
    border-right: 1px solid #E5E7EB;
    border-bottom: 1px solid #E5E7EB;
    padding: 0; text-align: center;
    height: 32px; min-width: 34px; vertical-align: middle;
  }
  .calendar thead th {
    background: #F9FAFB; font-weight: 600; color: #4B5563;
    position: sticky; top: 0; z-index: 1;
    border-top: 1px solid #E5E7EB;
  }
  .calendar .name-col {
    text-align: left; padding: 0 8px;
    background: #F9FAFB;
    min-width: 100px; width: 100px;
    font-weight: 600; color: #111827;
    position: sticky; left: 0; z-index: 2;
    border-left: 1px solid #E5E7EB;
    white-space: nowrap;
  }
  .calendar thead .name-col { z-index: 3; }
  .calendar .holiday-col {
    background: #F9FAFB;
    min-width: 62px; width: 62px;
    font-weight: 700; color: #111827;
    position: sticky; right: 0; z-index: 2;
    border-right: 1px solid #E5E7EB;
    border-left: 1px solid #E5E7EB;
  }
  .calendar thead .holiday-col { z-index: 3; }
  .holiday-input {
    width: 42px; padding: 2px 4px;
    background: #FFF; border: 1px solid #D1D5DB;
    border-radius: 3px; font-weight: 700; color: #111827;
    text-align: center; font-size: 11px;
  }
  .holiday-display {
    font-weight: 700; color: #111827; font-size: 11px;
  }
  .holiday-mismatch { color: #DC2626; }
  .calendar .day-num { font-weight: 600; color: #111827; font-size: 11px; }
  .calendar .day-sun { color: #DC2626; }
  .calendar .day-sat { color: #2563EB; }
  .req-row td { background: #FAFAFA; font-weight: 600; color: #6B7280; }
  .req-row .name-col, .req-row .holiday-col {
    font-size: 10px; color: #6B7280; font-weight: 600; background: #FAFAFA;
  }
  .req-input {
    width: 28px; padding: 0; background: transparent; border: none;
    text-align: center; font-weight: 600; color: #4B5563;
    font-size: 11px;
  }
  .req-input:focus { background: #FFF; outline: 1px solid #2563EB; }
  .req-cell-violation { background: #FEE2E2 !important; }

  /* 社員必要人数行 */
  .req-row-employee td {
    background: #F5F3FF !important;
    color: #5B21B6;
    font-size: 10px;
  }
  .req-row-employee .name-col {
    background: #F5F3FF !important;
    color: #5B21B6;
    font-size: 10px;
  }
  .req-row-employee .req-input { color: #5B21B6; }

  /* 社員出勤数集計行 */
  .summary-row-employee td {
    background: #F0F9FF !important;
    color: #075985;
    font-size: 10px;
  }
  .summary-row-employee .name-col, .summary-row-employee .holiday-col {
    background: #E0F2FE !important;
    color: #075985;
    font-size: 10px;
  }

  /* 社員出勤数集計行：ギリギリ最低ライン（実 = 必要数）強調 */
  .summary-borderline {
    background: #FEF3C7 !important;
    color: #92400E !important;
    font-weight: 700 !important;
  }

  /* 出勤数集計行 */
  .summary-row td {
    background: #F0FDF4;
    font-weight: 700;
    color: #065F46;
    font-size: 11px;
  }
  .summary-row .name-col, .summary-row .holiday-col {
    background: #DCFCE7;
    color: #065F46;
    font-size: 10px;
  }
  .summary-under {
    background: #FEE2E2 !important;
    color: #991B1B !important;
  }

  /* 週区切り（日曜の左に二重線） */
  .calendar th.week-start,
  .calendar td.week-start {
    border-left: 3px double #6B7280;
  }

  /* 月休日数の規定値入力 */
  .holiday-base-input {
    width: 28px; padding: 0; background: transparent; border: none;
    text-align: center; font-weight: 700; color: #111827;
    font-size: 11px;
  }
  .holiday-base-input:focus { background: #FFF; outline: 1px solid #2563EB; }

  /* Category divider rows */
  .category-row td {
    background: #1F2937 !important;
    color: #FFFFFF;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-align: left;
    padding: 4px 12px !important; height: 22px;
    position: sticky; left: 0;
  }

  /* Group row tints */
  .row-tint-a > td { background-color: #FFFBEB; }
  .row-tint-a > td.name-col, .row-tint-a > td.holiday-col { background-color: #FEF7E0; }
  .row-tint-b > td { background-color: #F0FDF4; }
  .row-tint-b > td.name-col, .row-tint-b > td.holiday-col { background-color: #E4F8EB; }
  .row-tint-c > td { background-color: #EFF6FF; }
  .row-tint-c > td.name-col, .row-tint-c > td.holiday-col { background-color: #DBEAFE; }
  .row-tint-d > td { background-color: #FAF5FF; }
  .row-tint-d > td.name-col, .row-tint-d > td.holiday-col { background-color: #EDE9FE; }

  /* Shift cell types */
  .cell {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    position: relative;
  }
  .cell-selected::after {
    content: ''; position: absolute; inset: 0;
    box-shadow: inset 0 0 0 2px #2563EB;
    background: rgba(37, 99, 235, 0.12);
    pointer-events: none; z-index: 1;
  }
  .calendar td.has-selection { position: relative; }
  .cell-work { background: #DBEAFE; color: #1E40AF; }
  .cell-off { color: #111827; }
  .cell-holiday { background: #FCE7F3; color: #DC2626; font-weight: 700; }
  .cell.cell-ic-off { color: #DC2626; font-weight: 700; } /* ICスタッフの休みは種類問わず赤字 */
  .cell-required { background: #2563EB; color: #FFFFFF; }
  .cell-training { background: #FEF3C7; color: #92400E; }
  .cell-paid { background: #E0E7FF; color: #4338CA; }
  .cell-violation {
    outline: 2px solid #DC2626; outline-offset: -2px;
    z-index: 2; position: relative;
  }

  /* Legend */
  .legend {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 12px 0 0; font-size: 11px; color: #4B5563;
    align-items: center;
  }
  .legend-hint {
    font-size: 11px; color: #6B7280; margin-right: 4px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 9px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    font-size: 11px; color: #4B5563;
    cursor: pointer;
    user-select: none;
    font-family: inherit;
    transition: background 0.1s, border-color 0.1s;
  }
  .legend-item:hover { background: #F3F4F6; }
  .legend-item.active {
    background: #DBEAFE;
    border-color: #2563EB;
    color: #1E40AF;
    font-weight: 700;
    box-shadow: 0 1px 3px rgba(37,99,235,0.2);
  }
  .legend-item.legend-violation {
    cursor: default;
    background: transparent;
  }
  .legend-item.legend-violation:hover { background: transparent; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 2px; border: 1px solid #E5E7EB;
    flex-shrink: 0;
  }

  /* Mode indicator bar */
  .mode-bar {
    background: linear-gradient(to right, #FEF3C7, #FDE68A);
    border: 1px solid #F59E0B;
    border-radius: 4px;
    padding: 8px 14px;
    margin-bottom: 12px;
    font-size: 12px;
    color: #78350F;
    display: flex; align-items: center; gap: 12px;
  }
  .mode-bar.hidden { display: none; }
  .mode-bar-label { font-weight: 700; }
  .mode-bar-hint { color: #92400E; font-size: 11px; flex: 1; }
  .mode-bar-exit {
    background: #FFF;
    border: 1px solid #D97706;
    color: #92400E;
    padding: 3px 10px;
    font-size: 11px;
    border-radius: 3px;
    font-weight: 600;
    cursor: pointer;
  }
  .mode-bar-exit:hover { background: #FEF3C7; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.hidden { display: none; }
  .modal {
    background: #FFF; border-radius: 8px;
    padding: 24px; min-width: 380px; max-width: 500px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
  }
  .modal-title {
    font-size: 16px; font-weight: 700; color: #111827;
    margin-bottom: 16px;
  }
  .form-row { margin-bottom: 12px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: #374151; margin-bottom: 4px;
  }
  .form-input, .form-select {
    width: 100%; padding: 7px 10px;
    border: 1px solid #D1D5DB; border-radius: 4px;
    font-size: 13px; color: #111827; background: #FFF;
  }
  .form-input:focus, .form-select:focus {
    outline: 2px solid #2563EB; outline-offset: -2px; border-color: transparent;
  }
  .form-row-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .modal-actions {
    display: flex; justify-content: space-between;
    margin-top: 20px; gap: 8px;
  }
  .modal-actions-right { display: flex; gap: 8px; }
  .checkbox-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 13px;
  }
  .checkbox-row input { width: 16px; height: 16px; }

  /* Cell type picker popover */
  .cell-picker {
    position: absolute; background: #FFF;
    border: 1px solid #D1D5DB; border-radius: 4px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    padding: 4px; z-index: 50;
    display: flex; flex-direction: column; gap: 2px;
  }
  .cell-picker-option {
    padding: 6px 12px; cursor: pointer; font-size: 12px;
    border-radius: 3px; text-align: left; min-width: 140px;
    display: flex; align-items: center; gap: 8px;
    border: none; background: transparent; color: #111827;
  }
  .cell-picker-option:hover { background: #F3F4F6; }
  .cell-picker-swatch {
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid #E5E7EB; flex-shrink: 0;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #111827; color: #FFF;
    padding: 12px 18px; border-radius: 6px;
    font-size: 13px; z-index: 200;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  /* 生成中ローディング */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, 0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 300;
  }
  .loading-overlay.hidden { display: none; }
  .loading-card {
    background: #FFF; border-radius: 8px;
    padding: 28px 40px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
    text-align: center; min-width: 280px;
  }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 4px solid #E5E7EB;
    border-top-color: #2563EB;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .loading-text {
    font-size: 14px; font-weight: 600; color: #111827;
    margin-bottom: 6px;
  }
  .loading-detail {
    font-size: 12px; color: #6B7280;
  }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 12px;
    flex-wrap: wrap; align-items: center;
  }
  .toolbar-label {
    font-size: 12px; color: #6B7280; font-weight: 600;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">シフト作成</div>
    <div id="sync-status" style="font-size:11px;color:#6B7280;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid transparent;" title="クリックで設定を開く"></div>
    <div class="month-nav">
      <button id="btn-prev-month">‹</button>
      <div class="month-label" id="month-label">2026年6月</div>
      <button id="btn-next-month">›</button>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" id="btn-save" title="共有フォルダへ保存 (Ctrl+S)">保存<span id="save-badge" style="display:none;margin-left:4px;color:#FBBF24;">●</span></button>
    <button class="btn btn-secondary" id="btn-settings" title="設定">⚙</button>
    <button class="btn btn-secondary" id="btn-copy-prev">前月コピー</button>
    <button class="btn btn-secondary" id="btn-export">Excel出力</button>
    <button class="btn btn-primary" id="btn-generate">生成</button>
  </div>
</div>

<div class="main">

  <aside class="sidebar">
    <div class="section">
      <div class="section-header">
        <div class="section-title">スタッフ <span id="staff-count"></span></div>
        <button class="add-btn" id="btn-add-staff" title="スタッフ追加">＋</button>
      </div>
      <div id="staff-list"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">グループ</div>
        <button class="add-btn" id="btn-add-group" title="グループ追加">＋</button>
      </div>
      <div id="group-list"></div>
    </div>
  </aside>

  <main class="content">

    <div class="toolbar">
      <span class="toolbar-label">必要人数の一括設定:</span>
      <input type="number" id="bulk-required" min="0" max="99" placeholder="人数" style="width:60px;padding:4px 6px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px;">
      <button class="btn btn-secondary" id="btn-apply-bulk" style="padding:4px 10px;font-size:12px;">全日に適用</button>
      <button class="btn btn-secondary" id="btn-apply-weekday" style="padding:4px 10px;font-size:12px;">平日のみ</button>
      <button class="btn btn-secondary" id="btn-apply-weekend" style="padding:4px 10px;font-size:12px;">土日のみ</button>
    </div>

    <div class="mode-bar hidden" id="mode-bar"></div>

    <div class="violations hidden" id="violations">
      <div class="violations-header" id="violations-header">⚠ 違反 0件</div>
      <div class="violations-list" id="violations-list"></div>
    </div>

    <div class="calendar-wrap" id="calendar-wrap">
      <table class="calendar" id="calendar"></table>
    </div>

    <div class="legend" id="legend"></div>

  </main>
</div>

<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">シフト生成中…</div>
    <div class="loading-detail" id="loading-detail"></div>
  </div>
</div>

<script>
/* ============================================
 * シフト作成アプリ - メインスクリプト
 * ============================================ */

/* ===== 状態管理 ===== */
const STORAGE_KEY = 'shift_app_data_v1';
const STORAGE_TEMPLATE_KEY = 'shift_app_template_v1';

let state = {
  staff: [],          // { id, name, category, startHour, endHour, startMin, endMin, groupId, holidayBase }
  groups: [],         // { id, name, color }
  currentMonth: null, // "YYYY-MM"
  months: {},         // { "YYYY-MM": { requiredStaff: [...], paidLeaves: {}, shifts: {} } }
  minEmployees: 0,    // 最低社員数（全日共通、グローバル設定）
};

let nextStaffId = 1;
let nextGroupId = 1;

/* ===== モード・選択状態（永続化対象外） ===== */
let currentMode = null;          // null | '' | 'work' | 'off' | 'holiday' | 'required' | 'training' | 'paid'
let selectedCells = new Set();   // "rowIndex_day"
let isDragging = false;
let dragStart = null;            // { row, day }
let dragEnd = null;

/* ===== 永続化 =====
 * 作業中: localStorage へ自動保存（軽い・このPC内）
 * 共有フォルダ: ヘッダーの「保存」ボタン or Ctrl+S で手動保存のみ */
let hasUnsavedChanges = false; // 共有フォルダにまだ書いていない変更があるか
let lastSavedAt = null;        // 共有フォルダへの最終保存時刻

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      staff: state.staff,
      groups: state.groups,
      currentMonth: state.currentMonth,
      months: state.months,
      minEmployees: state.minEmployees,
      nextStaffId: nextStaffId,
      nextGroupId: nextGroupId,
    }));
  } catch (e) {
    console.error('保存失敗:', e);
    showToast('データ保存に失敗しました');
  }
  // 共有フォルダへは自動で書かない（手動保存方式）。未保存フラグだけ立てる
  if (!hasUnsavedChanges) {
    hasUnsavedChanges = true;
    updateSyncStatus();
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.staff = data.staff || [];
      state.staff.forEach(st => { if (!Array.isArray(st.fixedOffDays)) st.fixedOffDays = []; }); // 旧データ互換
      state.groups = data.groups || [];
      state.currentMonth = data.currentMonth || null;
      state.months = data.months || {};
      state.minEmployees = data.minEmployees || 0;
      nextStaffId = data.nextStaffId || 1;
      nextGroupId = data.nextGroupId || 1;
    }
  } catch (e) {
    console.error('読み込み失敗:', e);
  }

  // 現在月が未設定なら今月を設定
  if (!state.currentMonth) {
    const now = new Date();
    state.currentMonth = formatMonth(now.getFullYear(), now.getMonth() + 1);
  }
  ensureMonthData(state.currentMonth);
}

/* ===== 共有フォルダ同期 (File System Access API) ===== */
const SHARED_FILE_NAME = 'shift-data.json';
const HANDLE_DB_NAME = 'shift_app_handle_db';
const HANDLE_STORE = 'handles';
let sharedFolderHandle = null;
let sharedFolderName = null;
let sharedFolderNeedsReauth = false; // 権限切れフラグ（true の間は自動書き込みをスキップ）
let isWritingShared = false; // 書き込み競合防止
let lastSharedFolderError = null; // 直近の失敗情報をモーダルで表示するため保持

function isFileSystemAccessSupported() {
  return typeof window !== 'undefined' && typeof window.showDirectoryPicker === 'function';
}

// 診断ログを設定モーダル内の <pre id="folder-diag-log"> に追記する
function folderDiagLog(msg, kind = 'info') {
  const el = document.getElementById('folder-diag-log');
  console.log(`[Folder][${kind}] ${msg}`);
  if (!el) return;
  const colors = { info: '#374151', ok: '#059669', fail: '#DC2626', warn: '#D97706' };
  const icons  = { info: '○', ok: '✓', fail: '✗', warn: '⚠' };
  const line = document.createElement('div');
  line.style.cssText = `color:${colors[kind] || '#374151'};font-size:11px;line-height:1.5;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-all;`;
  const ts = new Date().toLocaleTimeString('ja-JP', { hour12: false });
  line.textContent = `${icons[kind] || '○'} [${ts}] ${msg}`;
  el.appendChild(line);
  // 親要素もスクロール
  el.scrollTop = el.scrollHeight;
}

function folderDiagClear() {
  const el = document.getElementById('folder-diag-log');
  if (el) el.innerHTML = '';
}

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(HANDLE_DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(HANDLE_STORE)) {
        db.createObjectStore(HANDLE_STORE);
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function saveHandleToDB(handle) {
  try {
    const db = await openHandleDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).put(handle, 'sharedFolder');
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  } catch (e) {
    console.error('ハンドル保存失敗:', e);
  }
}

async function loadHandleFromDB() {
  try {
    const db = await openHandleDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readonly');
      const req = tx.objectStore(HANDLE_STORE).get('sharedFolder');
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  } catch (e) {
    console.error('ハンドル読み込み失敗:', e);
    return null;
  }
}

async function clearHandleFromDB() {
  try {
    const db = await openHandleDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).delete('sharedFolder');
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  } catch (e) { console.error(e); }
}

// 共有フォルダを有効化（ユーザー操作起点で呼ぶ）
// 設定モーダル内の <div id="folder-diag-log"> に進捗をライブ表示する
async function enableSharedFolder() {
  lastSharedFolderError = null;
  folderDiagClear();
  folderDiagLog('開始: 共有フォルダ設定');

  if (!isFileSystemAccessSupported()) {
    folderDiagLog('お使いのブラウザは File System Access API 未対応', 'fail');
    lastSharedFolderError = { name: 'NotSupported', message: 'ブラウザ未対応（Chrome/Edge推奨）' };
    showToast('お使いのブラウザはこの機能に対応していません（Chrome/Edge推奨）');
    return false;
  }
  folderDiagLog('FSA サポート: OK', 'ok');

  // ピッカー
  folderDiagLog('フォルダピッカーを開きます…');
  let handle;
  try {
    handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    folderDiagLog(`フォルダ選択: "${handle.name}" (kind=${handle.kind})`, 'ok');
  } catch (e) {
    if (e.name === 'AbortError') {
      // 注意: 本当のキャンセルだけでなく、ブラウザがフォルダを「拒否」した場合も
      // 同じ AbortError になる（Chromium の仕様）。切り分けヒントを出す。
      folderDiagLog(`AbortError: ${e.message || '(no msg)'}`, 'warn');
      folderDiagLog('ヒント①: 自分でキャンセルしていないのにこれが出る場合、選んだフォルダがブラウザにブロックされています', 'warn');
      folderDiagLog('ヒント②: ドライブ直下(C:\\ や \\\\サーバー\\共有 のルート)・ユーザーフォルダ直下・ダウンロードフォルダ・OneDriveルートは選択NG', 'warn');
      folderDiagLog('ヒント③: 対象フォルダの中に一段深いサブフォルダ（例:「シフトデータ」）を作って、それを選び直してください', 'warn');
      folderDiagLog('ヒント④: それでも出る場合は企業ポリシーの可能性 → edge://policy で FileSystem 系ポリシーを確認', 'warn');
      lastSharedFolderError = { name: 'AbortError', message: 'キャンセル、またはブラウザによるフォルダ拒否' };
      return false;
    }
    folderDiagLog(`ピッカー失敗: ${e.name} — ${e.message || '(no msg)'}`, 'fail');
    lastSharedFolderError = { name: e.name, message: e.message || '' };
    console.error('showDirectoryPicker failed:', e);
    return false;
  }

  // 権限ステータスを照会（参考情報。実判定は write で行う）
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    folderDiagLog(`queryPermission(readwrite) = ${perm}`, perm === 'granted' ? 'ok' : 'warn');
  } catch (e) {
    folderDiagLog(`queryPermission 例外（無視可）: ${e.name}`, 'warn');
  }

  // 旧ハンドルを退避（書き込み失敗時 rollback 用）
  const prevHandle = sharedFolderHandle;
  const prevName = sharedFolderName;
  const prevNeedsReauth = sharedFolderNeedsReauth;

  sharedFolderHandle = handle;
  sharedFolderName = handle.name;
  sharedFolderNeedsReauth = false;

  // 既存ファイル読み込みを試す
  folderDiagLog(`${SHARED_FILE_NAME} の存在チェック…`);
  let existing = false;
  try {
    existing = await readFromSharedFolder();
    folderDiagLog(existing ? '既存ファイル: 有り（state に読み込み済）' : '既存ファイル: 無し', existing ? 'ok' : 'info');
  } catch (e) {
    folderDiagLog(`読み込み中エラー（続行）: ${e.name} — ${e.message}`, 'warn');
  }

  // 書き込みテスト（既存有無に関わらず実施 → 権限の実証）
  folderDiagLog('書き込みテスト開始…');
  let writeError = null;
  try {
    folderDiagLog('getFileHandle(create:true) …');
    const fileHandle = await handle.getFileHandle(SHARED_FILE_NAME, { create: true });
    folderDiagLog('getFileHandle: OK', 'ok');

    folderDiagLog('createWritable …');
    const writable = await fileHandle.createWritable();
    folderDiagLog('createWritable: OK', 'ok');

    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      staff: state.staff,
      groups: state.groups,
      currentMonth: state.currentMonth,
      months: state.months,
      minEmployees: state.minEmployees,
      nextStaffId, nextGroupId,
    };
    const json = JSON.stringify(payload, null, 2);
    folderDiagLog(`write (${json.length} bytes) …`);
    await writable.write(json);
    folderDiagLog('write: OK', 'ok');

    folderDiagLog('close …');
    await writable.close();
    folderDiagLog('close: OK', 'ok');

    // 書き戻し確認（実際にファイルが残ってるか）
    folderDiagLog('書き戻し確認 …');
    const verifyHandle = await handle.getFileHandle(SHARED_FILE_NAME, { create: false });
    const verifyFile = await verifyHandle.getFile();
    folderDiagLog(`書き戻し確認: OK (${verifyFile.size} bytes)`, 'ok');
  } catch (e) {
    writeError = e;
    folderDiagLog(`書き込み失敗: ${e.name} — ${e.message || '(no msg)'}`, 'fail');
  }

  if (writeError) {
    // 書き込み失敗 → rollback
    sharedFolderHandle = prevHandle;
    sharedFolderName = prevName;
    sharedFolderNeedsReauth = prevNeedsReauth;

    let hint = '';
    const nm = writeError.name || '';
    if (nm === 'NotAllowedError') {
      hint = '書き込み許可が取得できていません（ピッカーで「保存」承認していない、又はOS/IT制限）。';
    } else if (nm === 'NoModificationAllowedError') {
      hint = 'フォルダが書き込み禁止です（読み取り専用属性 / 別アプリがロック中）。';
    } else if (nm === 'SecurityError') {
      hint = 'ブラウザのセキュリティ制限（システムフォルダ / Downloads等）。別フォルダで試してください。';
    } else if (nm === 'InvalidStateError') {
      hint = 'フォルダ状態が無効（OneDrive/Dropbox 同期中、ネットワーク切断など）。';
    } else if (nm === 'AbortError') {
      hint = '操作が中断されました（タイムアウトやキャンセル）。';
    } else {
      hint = '不明なエラー。フォルダ・ブラウザ・OSの組み合わせを確認してください。';
    }
    lastSharedFolderError = { name: nm, message: writeError.message || '', hint };
    folderDiagLog(`原因ヒント: ${hint}`, 'fail');
    folderDiagLog('rollback 実施', 'warn');
    console.error('Initial write to shared folder failed:', writeError);
    showToast('共有フォルダ設定失敗: ' + (writeError.message || writeError.name));
    return false;
  }

  folderDiagLog('全工程 OK ✓✓✓', 'ok');

  // 書き込み成功 → 確定
  updateSyncStatus();

  // ハンドル永続化
  try {
    folderDiagLog('IndexedDB にハンドル保存…');
    await saveHandleToDB(handle);
    folderDiagLog('IndexedDB: OK', 'ok');
  } catch (e) {
    folderDiagLog(`IndexedDB 失敗（無視可・毎回フォルダ選択になります）: ${e.name}`, 'warn');
  }

  hasUnsavedChanges = false; // 設定直後はフォルダと同期済み
  showToast(existing
    ? `「${handle.name}」からデータを読み込みました`
    : `「${handle.name}」を同期フォルダにしました（${SHARED_FILE_NAME} 作成済）`
  );
  renderAll();
  return true;
}

// 共有フォルダ無効化
async function disableSharedFolder() {
  sharedFolderHandle = null;
  sharedFolderName = null;
  sharedFolderNeedsReauth = false;
  await clearHandleFromDB();
  showToast('共有フォルダ同期を解除しました');
}

// 共有フォルダから読み込み（state に反映）。データがあれば true、なければ false
async function readFromSharedFolder() {
  if (!sharedFolderHandle) return false;
  try {
    let fileHandle;
    try {
      fileHandle = await sharedFolderHandle.getFileHandle(SHARED_FILE_NAME, { create: false });
    } catch (e) {
      // ファイル未作成
      return false;
    }
    const file = await fileHandle.getFile();
    const text = await file.text();
    if (!text.trim()) return false;
    const data = JSON.parse(text);
    if (data && data.staff !== undefined) {
      state.staff = data.staff || [];
      state.staff.forEach(st => { if (!Array.isArray(st.fixedOffDays)) st.fixedOffDays = []; }); // 旧データ互換
      state.groups = data.groups || [];
      state.currentMonth = data.currentMonth || state.currentMonth;
      state.months = data.months || {};
      state.minEmployees = data.minEmployees || 0;
      nextStaffId = data.nextStaffId || 1;
      nextGroupId = data.nextGroupId || 1;
      ensureMonthData(state.currentMonth);
      // localStorage にも反映
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        staff: state.staff, groups: state.groups,
        currentMonth: state.currentMonth, months: state.months,
        minEmployees: state.minEmployees,
        nextStaffId, nextGroupId,
      }));
      return true;
    }
    return false;
  } catch (e) {
    console.error('共有フォルダ読み込み失敗:', e);
    showToast('共有フォルダ読み込み失敗: ' + e.message);
    return false;
  }
}

// 共有フォルダへ書き込み（「保存」ボタン / Ctrl+S からの手動保存で呼ばれる）
async function writeToSharedFolder() {
  if (!sharedFolderHandle || isWritingShared) return;
  // 権限切れ状態では試さない（毎回トーストが出るのを防ぐ）
  if (sharedFolderNeedsReauth) {
    throw new Error('権限切れ：ヘッダーの同期ステータスをクリックして再承認してください');
  }
  isWritingShared = true;
  try {
    const fileHandle = await sharedFolderHandle.getFileHandle(SHARED_FILE_NAME, { create: true });
    const writable = await fileHandle.createWritable();
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      staff: state.staff,
      groups: state.groups,
      currentMonth: state.currentMonth,
      months: state.months,
      minEmployees: state.minEmployees,
      nextStaffId, nextGroupId,
    };
    await writable.write(JSON.stringify(payload, null, 2));
    await writable.close();
  } catch (e) {
    // 権限切れ系のエラーならフラグを立てて、ヘッダーで再承認を促す
    if (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError')) {
      sharedFolderNeedsReauth = true;
      updateSyncStatus();
    }
    throw e;
  } finally {
    isWritingShared = false;
  }
}

// 手動保存（保存ボタン / Ctrl+S）。ユーザー操作起点なので権限要求も可能
async function manualSave() {
  if (!sharedFolderHandle) {
    showToast('共有フォルダが未設定です。⚙設定から選択してください');
    openSettingsModal();
    return;
  }
  try {
    let perm = 'prompt';
    try {
      perm = await sharedFolderHandle.queryPermission({ mode: 'readwrite' });
    } catch (e) { console.warn('queryPermission failed:', e); }
    if (perm !== 'granted') {
      perm = await sharedFolderHandle.requestPermission({ mode: 'readwrite' });
    }
    if (perm !== 'granted') {
      showToast('書き込み許可が得られませんでした（⚙設定から再選択できます）');
      return;
    }
    sharedFolderNeedsReauth = false;
    await writeToSharedFolder();
    hasUnsavedChanges = false;
    lastSavedAt = new Date();
    updateSyncStatus();
    showToast(`「${sharedFolderName}」に保存しました`);
  } catch (e) {
    console.error('手動保存失敗:', e);
    showToast('保存失敗: ' + (e.message || e.name));
    updateSyncStatus();
  }
}

// 起動時：共有フォルダ選択画面（前回フォルダへのワンクリック再接続付き）
async function showStartupFolderScreen() {
  if (!isFileSystemAccessSupported()) return;
  let storedHandle = null;
  try { storedHandle = await loadHandleFromDB(); } catch (e) { console.warn(e); }
  const name = storedHandle ? storedHandle.name : null;

  const ov = document.createElement('div');
  ov.id = 'startup-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:9999;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px;max-width:440px;width:90%;box-shadow:0 20px 50px rgba(0,0,0,.3);">
      <div style="font-size:16px;font-weight:700;margin-bottom:6px;">共有フォルダの選択</div>
      <div style="font-size:12px;color:#6B7280;line-height:1.6;margin-bottom:16px;">
        シフトデータ（${SHARED_FILE_NAME}）の保存先を選んでください。<br>
        作業中はこのPC内に自動保存され、共有フォルダへは<strong>「保存」ボタン（Ctrl+S）で手動保存</strong>します。
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${name ? `
        <button id="su-reconnect" class="btn btn-primary" style="width:100%;">📂 前回のフォルダ「${escapeHtml(name)}」に再接続して読み込む</button>
        <button id="su-reconnect-keep" class="btn btn-secondary" style="width:100%;">🔗 再接続のみ（このPCの作業データを保持）</button>` : ''}
        <button id="su-pick" class="btn ${name ? 'btn-secondary' : 'btn-primary'}" style="width:100%;">${name ? '別のフォルダを選ぶ' : '共有フォルダを選ぶ'}</button>
        <button id="su-skip" class="btn btn-secondary" style="width:100%;">フォルダなしで続行（このPCのみ）</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const close = () => ov.remove();

  if (name) {
    document.getElementById('su-reconnect').addEventListener('click', async () => {
      const ok = await reconnectStoredHandle(storedHandle, true);
      if (ok) close();
    });
    document.getElementById('su-reconnect-keep').addEventListener('click', async () => {
      const ok = await reconnectStoredHandle(storedHandle, false);
      if (ok) close();
    });
  }
  document.getElementById('su-pick').addEventListener('click', async () => {
    close();
    const ok = await enableSharedFolder();
    if (!ok) showToast('⚙設定からいつでも共有フォルダを設定できます');
  });
  document.getElementById('su-skip').addEventListener('click', () => {
    close();
    updateSyncStatus();
  });
}

// 保存済みハンドルへの再接続（loadData=true でフォルダのJSONを読み込む）
async function reconnectStoredHandle(handle, loadData) {
  try {
    let perm = 'prompt';
    try {
      perm = await handle.queryPermission({ mode: 'readwrite' });
    } catch (e) { console.warn('queryPermission on reconnect failed:', e); }
    if (perm !== 'granted') {
      perm = await handle.requestPermission({ mode: 'readwrite' });
    }
    if (perm !== 'granted') {
      showToast('アクセス許可が得られませんでした。「別のフォルダを選ぶ」を試してください');
      return false;
    }
    sharedFolderHandle = handle;
    sharedFolderName = handle.name;
    sharedFolderNeedsReauth = false;
    if (loadData) {
      const loaded = await readFromSharedFolder();
      hasUnsavedChanges = false;
      showToast(loaded
        ? `「${handle.name}」から読み込みました`
        : `「${handle.name}」に再接続しました（${SHARED_FILE_NAME} はまだありません）`);
    } else {
      // ローカルの作業データを保持 → フォルダとは差分がある扱い
      hasUnsavedChanges = true;
      showToast(`「${handle.name}」に再接続しました。Ctrl+S でこのPCのデータを保存できます`);
    }
    renderAll();
    return true;
  } catch (e) {
    console.error('再接続失敗:', e);
    showToast('再接続失敗: ' + (e.message || e.name));
    return false;
  }
}

// 同期動作テスト：強制書き込み → 読み戻し → 結果表示
async function testSharedFolderSync() {
  if (!sharedFolderHandle) {
    alert('共有フォルダが設定されていません');
    return;
  }
  try {
    // 許可状態の確認（このボタンクリック時の user activation で requestPermission を呼べる）
    let perm;
    try {
      perm = await sharedFolderHandle.queryPermission({ mode: 'readwrite' });
    } catch (e) {
      console.warn('queryPermission in test failed:', e);
      perm = 'prompt';
    }
    if (perm !== 'granted') {
      try {
        perm = await sharedFolderHandle.requestPermission({ mode: 'readwrite' });
      } catch (e) {
        alert(`❌ 許可要求エラー: ${e.name} - ${e.message}\n\n別のフォルダを試すか、ブラウザを再起動してみてください。`);
        return;
      }
    }
    if (perm !== 'granted') {
      alert(`❌ テスト失敗: 書き込み許可がありません（状態: ${perm}）\n\nブラウザの設定や管理者ポリシーで制限されている可能性があります。`);
      return;
    }

    // 許可が取れた → reauth フラグをクリア
    sharedFolderNeedsReauth = false;
    updateSyncStatus();

    // 書き込み試行
    showToast('テスト書き込み中…');
    await writeToSharedFolder();

    // 読み戻し試行
    const fileHandle = await sharedFolderHandle.getFileHandle(SHARED_FILE_NAME, { create: false });
    const file = await fileHandle.getFile();
    const sizeKB = (file.size / 1024).toFixed(1);
    const text = await file.text();
    const parsed = JSON.parse(text);

    const msg = `✅ テスト成功！

フォルダ: ${sharedFolderName}
ファイル: ${SHARED_FILE_NAME}
サイズ: ${sizeKB} KB
最終保存: ${parsed.exportedAt}
スタッフ数: ${(parsed.staff || []).length}名

このフォルダを覗くと shift-data.json が見えるはずです。`;
    alert(msg);
    showToast('テスト成功');
  } catch (e) {
    console.error(e);
    alert(`❌ テスト失敗\n\nエラー: ${e.message || e.name}\n\n考えられる原因:\n・選択したフォルダにブラウザが書き込めない\n・IT管理ポリシーでローカル書き込みが制限\n・ネットワーク経由フォルダ（UNCパス）でアクセス不可\n\n対策: JSONエクスポート/インポートでの手動運用に切り替えてください。`);
    showToast('テスト失敗（詳細はアラートに表示）');
  }
}

// 保留中のハンドルに対する許可要求（ユーザー操作起点）
async function requestPendingPermission() {
  if (!sharedFolderHandle) return false;
  try {
    const perm = await sharedFolderHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      sharedFolderNeedsReauth = false;
      const loaded = await readFromSharedFolder();
      updateSyncStatus();
      renderAll();
      showToast(`共有フォルダ「${sharedFolderName}」と同期再開${loaded ? '・データ読み込み済' : ''}`);
      return true;
    }
    showToast('アクセス許可が得られませんでした');
    return false;
  } catch (e) {
    console.error(e);
    showToast('許可要求失敗: ' + e.message);
    return false;
  }
}

/* ===== JSONエクスポート/インポート（手動バックアップ） ===== */
function exportDataToJson() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    staff: state.staff,
    groups: state.groups,
    currentMonth: state.currentMonth,
    months: state.months,
    minEmployees: state.minEmployees,
    nextStaffId, nextGroupId,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date();
  const fname = `shift_backup_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.json`;
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('バックアップファイルを保存しました');
}

function importDataFromJson(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || data.staff === undefined) throw new Error('不正なバックアップファイルです');
        state.staff = data.staff || [];
      state.staff.forEach(st => { if (!Array.isArray(st.fixedOffDays)) st.fixedOffDays = []; }); // 旧データ互換
        state.groups = data.groups || [];
        state.currentMonth = data.currentMonth || state.currentMonth;
        state.months = data.months || {};
        state.minEmployees = data.minEmployees || 0;
        nextStaffId = data.nextStaffId || 1;
        nextGroupId = data.nextGroupId || 1;
        ensureMonthData(state.currentMonth);
        saveState();
        renderAll();
        showToast('バックアップから復元しました');
        resolve();
      } catch (err) {
        showToast('読み込みエラー: ' + err.message);
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
    reader.readAsText(file);
  });
}

/* ===== 日付ユーティリティ ===== */
function formatMonth(year, month) {
  return `${year}-${String(month).padStart(2, '0')}`;
}

function parseMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  return { year: y, month: m };
}

function daysInMonth(ym) {
  const { year, month } = parseMonth(ym);
  return new Date(year, month, 0).getDate();
}

function dayOfWeek(ym, day) {
  const { year, month } = parseMonth(ym);
  return new Date(year, month - 1, day).getDay(); // 0=日, 6=土
}

const DOW_LABELS = ['日', '月', '火', '水', '木', '金', '土'];

function ensureMonthData(ym) {
  if (!state.months[ym]) {
    state.months[ym] = {
      requiredStaff: new Array(daysInMonth(ym)).fill(0),
      requiredEmployee: new Array(daysInMonth(ym)).fill(0),
      paidLeaves: {},
      shifts: {},
      generated: false,
    };
  } else {
    // generated フラグの旧データ互換性
    if (state.months[ym].generated === undefined) {
      state.months[ym].generated = Object.keys(state.months[ym].shifts || {}).length > 0;
    }
    // 日数調整（月によって28-31日）
    const days = daysInMonth(ym);
    if (state.months[ym].requiredStaff.length !== days) {
      const arr = new Array(days).fill(0);
      for (let i = 0; i < Math.min(days, state.months[ym].requiredStaff.length); i++) {
        arr[i] = state.months[ym].requiredStaff[i];
      }
      state.months[ym].requiredStaff = arr;
    }
    // requiredEmployee の旧データ互換性 + 日数調整
    if (!state.months[ym].requiredEmployee) {
      state.months[ym].requiredEmployee = new Array(days).fill(0);
    } else if (state.months[ym].requiredEmployee.length !== days) {
      const arr = new Array(days).fill(0);
      for (let i = 0; i < Math.min(days, state.months[ym].requiredEmployee.length); i++) {
        arr[i] = state.months[ym].requiredEmployee[i];
      }
      state.months[ym].requiredEmployee = arr;
    }
  }
}

function isMonthGenerated() {
  const md = state.months[state.currentMonth];
  return !!(md && md.generated);
}

/* ===== ID生成 ===== */
function newStaffId() { return nextStaffId++; }
function newGroupId() { return nextGroupId++; }

/* ===== UI共通 ===== */
function showToast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), duration);
}

function showModal(html) {
  const bd = document.getElementById('modal-backdrop');
  document.getElementById('modal-content').innerHTML = html;
  bd.classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.add('hidden');
}

function confirmDialog(message, onConfirm) {
  showModal(`
    <div class="modal-title">確認</div>
    <div style="margin-bottom:16px;font-size:13px;color:#374151;">${escapeHtml(message)}</div>
    <div class="modal-actions">
      <div></div>
      <div class="modal-actions-right">
        <button class="btn btn-secondary" id="confirm-cancel">キャンセル</button>
        <button class="btn btn-danger" id="confirm-ok">削除</button>
      </div>
    </div>
  `);
  document.getElementById('confirm-cancel').addEventListener('click', closeModal);
  document.getElementById('confirm-ok').addEventListener('click', () => {
    closeModal();
    onConfirm();
  });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

/* ===== シフト種別の定義 ===== */
const SHIFT_TYPES = {
  '':         { label: '未設定', class: 'cell-off', text: '', countAsWork: false, countAsHoliday: false, locked: false, excel: '' },
  'work':     { label: '出勤',   class: 'cell-work', text: '出', countAsWork: true,  countAsHoliday: false, locked: false, excel: '' },
  'off':      { label: '休み',   class: 'cell-off', text: '休', countAsWork: false, countAsHoliday: true, locked: false, excel: '休' },
  'holiday':  { label: '希望休', class: 'cell-holiday', text: '休', countAsWork: false, countAsHoliday: true, locked: true, excel: '休' },
  'required': { label: '必須出勤', class: 'cell-required', text: '必', countAsWork: true, countAsHoliday: false, locked: true, excel: '' },
  'training': { label: '研修',   class: 'cell-training', text: '研', countAsWork: false, countAsHoliday: false, locked: false, excel: '' },
};

function getShift(staffId, day) {
  const md = state.months[state.currentMonth];
  if (!md) return '';
  const key = `${staffId}_${day}`;
  return md.shifts[key] || '';
}

function setShift(staffId, day, type) {
  const md = state.months[state.currentMonth];
  const key = `${staffId}_${day}`;
  if (type === '' || type === null) {
    delete md.shifts[key];
  } else {
    md.shifts[key] = type;
  }
}

/* スタッフが当日「現場にいる」か（出勤扱いか）
 * 明示的に countAsWork=true のシフトのみカウント。未設定はカウントしない。
 * ※ 生成後は全員 'work' or 'off' に確定するので未設定が残らない想定。
 */
function isOnSite(staffId, day) {
  const t = getShift(staffId, day);
  if (!t) return false;
  const def = SHIFT_TYPES[t];
  return !!(def && def.countAsWork);
}

<script>
/* ===== サイドバー描画 ===== */
function renderSidebar() {
  renderStaffList();
  renderGroupList();
}

function renderStaffList() {
  const container = document.getElementById('staff-list');
  document.getElementById('staff-count').textContent = `(${state.staff.length}名)`;

  const byCat = {};
  CATEGORIES.forEach(c => byCat[c] = []);

  });

  CATEGORIES.forEach(cat => {

    if (byCat[cat].length === 0) {

    } else {
      byCat[cat].forEach(s => {
        const group = state.groups.find(g => g.id === s.groupId);

          ? `<span class="group-tag group-tag-${group.color}" style="background:${groupSwatchBg(group.color)};color:${groupSwatchFg(group.color)}">${escapeHtml(group.name)}</span>`
          : '';

          : '';
        const holidayStr = `休${s.holidayBase}日${fixedStr}`;
        html += `
          <div class="staff-card" data-staff-id="${s.id}">
            <div class="staff-name">${escapeHtml(s.name)} ${groupTag}</div>
            <div class="staff-meta">${timeStr} ／ ${holidayStr}</div>
          </div>
        `;
      });
    }
  });
  container.innerHTML = html;

  // クリックで編集（ドラッグ直後のクリックは無視）
  container.querySelectorAll('.staff-card').forEach(card => {
    card.addEventListener('click', () => {
      if (staffDragSuppressClick) return;
      const id = parseInt(card.dataset.staffId);
      openStaffModal(id);
    });
  });

  // 長押しドラッグで並び替え（初回のみ初期化）
  attachStaffDragReorder(container);
}

/* ===== スタッフの長押しドラッグ並び替え =====
 * 350ms 長押しでドラッグ開始。同じ属性（カテゴリ）内でのみ入れ替え可能。
 * 並び順は state.staff の配列順で、カレンダーの行順にも反映される。 */
let staffDragSuppressClick = false;

function attachStaffDragReorder(container) {
  if (container._dragInit) return; // リスナーはコンテナに1回だけ（再描画で消えない）
  container._dragInit = true;

  const LONG_PRESS_MS = 350;
  const MOVE_CANCEL_PX = 8;
  let drag = null; // { staffId, category, card, startX, startY, lastX, lastY, timer, active, ghost, dropTarget, scrollEl }

  function findScrollable(el) {
    let cur = el;
    while (cur && cur !== document.body) {
      if (cur.scrollHeight > cur.clientHeight + 4) return cur;
      cur = cur.parentElement;
    }
    return null;
  }

  function clearIndicators() {
    container.querySelectorAll('.drop-before, .drop-after').forEach(c =>
      c.classList.remove('drop-before', 'drop-after'));
  }

  function cleanup() {
    if (!drag) return;
    clearTimeout(drag.timer);
    if (drag.ghost) drag.ghost.remove();
    if (drag.card) drag.card.classList.remove('drag-source');
    clearIndicators();
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onCancel);
    drag = null;
  }

  function activate() {
    if (!drag) return;
    drag.active = true;
    drag.card.classList.add('drag-source');
    drag.scrollEl = findScrollable(container);
    // ゴースト作成
    const rect = drag.card.getBoundingClientRect();
    const ghost = drag.card.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${drag.lastY - rect.height / 2}px;width:${rect.width}px;margin:0;z-index:10000;pointer-events:none;opacity:0.92;box-shadow:0 8px 20px rgba(0,0,0,.25);background:#fff;`;
    document.body.appendChild(ghost);
    drag.ghost = ghost;
    updateDropTarget();
  }

  function updateDropTarget() {
    clearIndicators();
    drag.dropTarget = null;
    const y = drag.lastY;
    // 同カテゴリのカードのみ対象（自分自身は除く）
    const cards = Array.from(container.querySelectorAll('.staff-card')).filter(c => {
      const id = parseInt(c.dataset.staffId);
      if (id === drag.staffId) return false;
      const st = state.staff.find(x => x.id === id);
      return st && st.category === drag.category;
    });
    if (cards.length === 0) return;
    // ポインタYに最も近いカードを選び、中心より上なら before / 下なら after
    let best = null, bestDist = Infinity;
    cards.forEach(c => {
      const r = c.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      const dist = Math.abs(y - mid);
      if (dist < bestDist) { bestDist = dist; best = { card: c, before: y < mid }; }
    });
    if (best) {
      best.card.classList.add(best.before ? 'drop-before' : 'drop-after');
      drag.dropTarget = { id: parseInt(best.card.dataset.staffId), before: best.before };
    }
  }

  function onMove(e) {
    if (!drag) return;
    drag.lastX = e.clientX;
    drag.lastY = e.clientY;
    if (!drag.active) {
      // 長押し前に動きすぎたらキャンセル（通常クリック/スクロール扱い）
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      if (Math.hypot(dx, dy) > MOVE_CANCEL_PX) cleanup();
      return;
    }
    e.preventDefault();
    // ゴースト追従
    drag.ghost.style.top = `${e.clientY - drag.ghost.offsetHeight / 2}px`;
    // 端に近づいたら自動スクロール
    if (drag.scrollEl) {
      const r = drag.scrollEl.getBoundingClientRect();
      if (e.clientY < r.top + 30) drag.scrollEl.scrollTop -= 10;
      else if (e.clientY > r.bottom - 30) drag.scrollEl.scrollTop += 10;
    }
    updateDropTarget();
  }

  function onUp() {
    if (!drag) return;
    if (drag.active && drag.dropTarget) {
      const fromIdx = state.staff.findIndex(x => x.id === drag.staffId);
      const [moved] = state.staff.splice(fromIdx, 1);
      let toIdx = state.staff.findIndex(x => x.id === drag.dropTarget.id);
      if (!drag.dropTarget.before) toIdx++;
      state.staff.splice(toIdx, 0, moved);
      staffDragSuppressClick = true;
      setTimeout(() => { staffDragSuppressClick = false; }, 80);
      cleanup();
      saveState();
      renderAll();
      return;
    }
    if (drag.active) {
      // ドラッグしたがドロップ先なし → クリック扱いにしない
      staffDragSuppressClick = true;
      setTimeout(() => { staffDragSuppressClick = false; }, 80);
    }
    cleanup();
  }

  function onCancel() { cleanup(); }

  container.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    const card = e.target.closest('.staff-card');
    if (!card || !container.contains(card)) return;
    const id = parseInt(card.dataset.staffId);
    const s = state.staff.find(x => x.id === id);
    if (!s) return;
    cleanup(); // 念のため前回の残骸を掃除
    drag = {
      staffId: id, category: s.category, card,
      startX: e.clientX, startY: e.clientY,
      lastX: e.clientX, lastY: e.clientY,
      active: false, ghost: null, dropTarget: null, scrollEl: null,
      timer: setTimeout(activate, LONG_PRESS_MS),
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onCancel);
  });

  // 長押し時のコンテキストメニュー・ネイティブドラッグを抑止
  container.addEventListener('contextmenu', (e) => { if (drag) e.preventDefault(); });
  container.addEventListener('dragstart', (e) => e.preventDefault());
}

function renderGroupList() {
  const container = document.getElementById('group-list');
  if (state.groups.length === 0) {
    container.innerHTML = '<div class="empty-msg">グループなし</div>';
    return;
  }
  let html = '';
  state.groups.forEach(g => {
    const members = state.staff.filter(s => s.groupId === g.id).map(s => s.name).join('・');
    html += `
      <div class="group-card" data-group-id="${g.id}">
        <div class="group-name">
          <span class="group-swatch" style="background:${groupSwatchBg(g.color)};border:1px solid ${groupSwatchBorder(g.color)}"></span>
          ${escapeHtml(g.name)}
        </div>
        <div class="group-members">${escapeHtml(members) || '（メンバーなし）'}</div>
      </div>
    `;
  });
  container.innerHTML = html;

  container.querySelectorAll('.group-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.groupId);
      openGroupModal(id);
    });
  });
}

function groupSwatchBg(color) {
  return { a: '#FFFBEB', b: '#F0FDF4', c: '#EFF6FF', d: '#FAF5FF' }[color] || '#F3F4F6';
}
function groupSwatchBorder(color) {
  return { a: '#FDE68A', b: '#BBF7D0', c: '#BFDBFE', d: '#DDD6FE' }[color] || '#D1D5DB';
}
function groupSwatchFg(color) {
  return { a: '#92400E', b: '#065F46', c: '#1E40AF', d: '#5B21B6' }[color] || '#374151';
}

function formatTime(h, m) {
  return `${h}:${String(m || 0).padStart(2, '0')}`;
}

          <span>:</span>
          <input type="number" class="form-input" id="sm-start-m" min="0" max="59" step="5" value="${s ? (s.startMin || 0) : 0}" style="width:60px;">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">退勤時刻</label>
        <div style="display:flex;gap:4px;align-items:center;">
          <input type="number" class="form-input" id="sm-end-h" min="0" max="23" value="${s ? s.endHour : 18}" style="width:60px;">
          <span>:</span>
          <input type="number" class="form-input" id="sm-end-m" min="0" max="59" step="5" value="${s ? (s.endMin || 0) : 0}" style="width:60px;">
        </div>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">月の基本休日数 <span id="sm-holiday-hint" style="font-weight:400;color:#6B7280;font-size:11px;"></span></label>
      <input type="number" class="form-input" id="sm-holiday" min="0" max="31" value="${s ? s.holidayBase : 10}">
    </div>

    <div class="form-row">
      <label class="form-label">グループ</label>
      <select class="form-select" id="sm-group">${groupOptions}</select>

    <div class="form-row">
