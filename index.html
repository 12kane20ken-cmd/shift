      <div style="display:flex;gap:10px;flex-wrap:wrap;padding:4px 0;">
        ${['日','月','火','水','木','金','土'].map((w, i) =>
          `<label style="display:flex;align-items:center;gap:3px;font-size:13px;cursor:pointer;${i === 0 ? 'color:#DC2626;' : i === 6 ? 'color:#2563EB;' : ''}"><input type="checkbox" class="sm-fixed-day" value="${i}" ${s && Array.isArray(s.fixedOffDays) && s.fixedOffDays.includes(i) ? 'checked' : ''}>${w}</label>`
        ).join('')}
      </div>
    </div>

    <div class="modal-actions">
      <div>${isEdit ? `<button class="btn btn-danger" id="sm-delete">削除</button>` : ''}</div>
      <div class="modal-actions-right">
        <button class="btn btn-secondary" id="sm-cancel">キャンセル</button>
        <button class="btn btn-primary" id="sm-save">保存</button>
      </div>
    </div>
  `;
  showModal(html);

  // カテゴリーに応じて休日数のヒント表示
  function updateHint() {
    const cat = document.getElementById('sm-category').value;
    const hint = document.getElementById('sm-holiday-hint');
    if (cat === '社員') hint.textContent = '（社員：基本10日）';
    else if (cat === 'パート・派遣') hint.textContent = '（個別設定）';
    else hint.textContent = '（個別設定）';
  }
  document.getElementById('sm-category').addEventListener('change', updateHint);
  updateHint();

  document.getElementById('sm-cancel').addEventListener('click', closeModal);
  document.getElementById('sm-save').addEventListener('click', () => {
    const name = document.getElementById('sm-name').value.trim();
    if (!name) { showToast('名前を入力してください'); return; }
    const category = document.getElementById('sm-category').value;
    const startHour = parseInt(document.getElementById('sm-start-h').value) || 0;
    const startMin = parseInt(document.getElementById('sm-start-m').value) || 0;
    const endHour = parseInt(document.getElementById('sm-end-h').value) || 0;
    const endMin = parseInt(document.getElementById('sm-end-m').value) || 0;
    const holidayBase = parseInt(document.getElementById('sm-holiday').value) || 0;
    const groupIdRaw = document.getElementById('sm-group').value;
    const groupId = groupIdRaw === '' ? null : parseInt(groupIdRaw);
    const fixedOffDays = Array.from(document.querySelectorAll('.sm-fixed-day:checked')).map(el => parseInt(el.value));

    if (isEdit) {
      Object.assign(s, { name, category, startHour, startMin, endHour, endMin, holidayBase, groupId, fixedOffDays });
    } else {
      state.staff.push({
        id: newStaffId(),
        name, category, startHour, startMin, endHour, endMin, holidayBase, groupId, fixedOffDays,
      });
    }
    saveState();
    closeModal();
    renderAll();
  });

  if (isEdit) {
    document.getElementById('sm-delete').addEventListener('click', () => {
      closeModal();
      confirmDialog(
        `「${s.name}」を削除しますか？\nこのスタッフの全シフトデータも削除されます。\nこの操作は取り消せません。`,
        () => deleteStaff(staffId)
      );
    });
  }
}

function deleteStaff(staffId) {
  state.staff = state.staff.filter(s => s.id !== staffId);
  // 全月のシフトから削除
  Object.values(state.months).forEach(md => {
    Object.keys(md.shifts).forEach(k => {
      if (k.startsWith(`${staffId}_`)) delete md.shifts[k];
    });
    if (md.paidLeaves) delete md.paidLeaves[staffId];
  });
  saveState();
  renderAll();
  showToast('削除しました');
}

/* ===== グループモーダル ===== */
function openGroupModal(groupId) {
  const isEdit = groupId != null;
  const g = isEdit ? state.groups.find(x => x.id === groupId) : null;

  const usedColors = state.groups.filter(x => !g || x.id !== g.id).map(x => x.color);
  const availColors = GROUP_COLORS.filter(c => !usedColors.includes(c));
  const currentColor = g ? g.color : availColors[0];

  const colorOptions = GROUP_COLORS.map(c => {
    const disabled = (!g || g.color !== c) && usedColors.includes(c);
    const checked = c === currentColor;
    return `
      <label class="checkbox-row" style="${disabled ? 'opacity:0.4;pointer-events:none;' : 'cursor:pointer;'}">
        <input type="radio" name="gm-color" value="${c}" ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
        <span class="group-swatch" style="background:${groupSwatchBg(c)};border:1px solid ${groupSwatchBorder(c)};"></span>
        色 ${c.toUpperCase()} ${disabled ? '(使用中)' : ''}
      </label>
    `;
  }).join('');

  let staffCheckboxes = '';
  state.staff.forEach(s => {
    const checked = (s.groupId === groupId);
    const disabled = (s.groupId != null && s.groupId !== groupId);
    staffCheckboxes += `
      <label class="checkbox-row" style="${disabled ? 'opacity:0.4;' : ''}">
        <input type="checkbox" name="gm-staff" value="${s.id}" ${checked ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
        ${escapeHtml(s.name)} <span style="color:#9CA3AF;font-size:11px;">（${escapeHtml(s.category)}）</span>
        ${disabled ? '<span style="color:#9CA3AF;font-size:11px;">他グループ所属</span>' : ''}
      </label>
    `;
  });
  if (!staffCheckboxes) staffCheckboxes = '<div class="empty-msg">スタッフを先に追加してください</div>';

  const html = `
    <div class="modal-title">${isEdit ? 'グループ編集' : 'グループ追加'}</div>

    <div class="form-row">
      <label class="form-label">グループ名</label>
      <input type="text" class="form-input" id="gm-name" value="${g ? escapeHtml(g.name) : ''}" placeholder="例: 早番">
    </div>

    <div class="form-row">
      <label class="form-label">色</label>
      ${colorOptions}
    </div>

    <div class="form-row">
      <label class="form-label">メンバー（休みを被らせない対象）</label>
      <div style="max-height:200px;overflow-y:auto;border:1px solid #E5E7EB;border-radius:4px;padding:8px;">
        ${staffCheckboxes}
      </div>
    </div>

    <div class="modal-actions">
      <div>${isEdit ? `<button class="btn btn-danger" id="gm-delete">削除</button>` : ''}</div>
      <div class="modal-actions-right">
        <button class="btn btn-secondary" id="gm-cancel">キャンセル</button>
        <button class="btn btn-primary" id="gm-save">保存</button>
      </div>
    </div>
  `;
  showModal(html);

  document.getElementById('gm-cancel').addEventListener('click', closeModal);
  document.getElementById('gm-save').addEventListener('click', () => {
    const name = document.getElementById('gm-name').value.trim();
    if (!name) { showToast('グループ名を入力してください'); return; }
    const color = document.querySelector('input[name="gm-color"]:checked')?.value || 'a';
    const memberIds = Array.from(document.querySelectorAll('input[name="gm-staff"]:checked'))
      .map(el => parseInt(el.value));

    if (isEdit) {
      g.name = name;
      g.color = color;
    } else {
      const newId = newGroupId();
      state.groups.push({ id: newId, name, color });
      groupId = newId;
    }

    // 既存メンバーから外し、新メンバーを設定
    state.staff.forEach(s => {
      if (s.groupId === groupId && !memberIds.includes(s.id)) s.groupId = null;
      if (memberIds.includes(s.id)) s.groupId = groupId;
    });

    saveState();
    closeModal();
    renderAll();
  });

  if (isEdit) {
    document.getElementById('gm-delete').addEventListener('click', () => {
      closeModal();
      confirmDialog(
        `グループ「${g.name}」を削除しますか？\n所属スタッフのグループ設定は外れます（スタッフ自体は削除されません）。`,
        () => deleteGroup(groupId)
      );
    });
  }
}

function deleteGroup(groupId) {
  state.groups = state.groups.filter(g => g.id !== groupId);
  state.staff.forEach(s => { if (s.groupId === groupId) s.groupId = null; });
  saveState();
  renderAll();
  showToast('削除しました');
}

</script>
<script>
/* ===== カレンダー描画 ===== */
function renderCalendar() {
  const ym = state.currentMonth;
  const days = daysInMonth(ym);
  const md = state.months[ym];
  const calendar = document.getElementById('calendar');

  // ヘッダー行
  let theadHtml = '<thead><tr>';
  theadHtml += '<th class="name-col">スタッフ</th>';
  for (let d = 1; d <= days; d++) {
    const dow = dayOfWeek(ym, d);
    const dowCls = dow === 0 ? 'day-sun' : (dow === 6 ? 'day-sat' : '');
    const weekStart = (dow === 0 && d > 1) ? ' week-start' : '';
    theadHtml += `<th class="${weekStart}">${d}<br><span class="day-num ${dowCls}">${DOW_LABELS[dow]}</span></th>`;
  }
  theadHtml += '<th class="holiday-col">月休<br>日数</th>';
  theadHtml += '</tr>';

  // 必要人数行（全体）
  theadHtml += '<tr class="req-row">';
  theadHtml += '<td class="name-col">必要人数</td>';
  for (let d = 1; d <= days; d++) {
    const v = md.requiredStaff[d - 1] || 0;
    const dow = dayOfWeek(ym, d);
    const weekStart = (dow === 0 && d > 1) ? ' week-start' : '';
    theadHtml += `<td class="${weekStart}"><input type="number" class="req-input" data-day="${d}" data-field="total" min="0" max="99" value="${v}"></td>`;
  }
  theadHtml += '<td class="holiday-col">―</td>';
  theadHtml += '</tr></thead>';

  // 本体（カテゴリーごとに区切り）
  let tbodyHtml = '<tbody>';

  // orderedStaffCache を再構築（カテゴリ順）
  orderedStaffCache = [];
  const byCat = {};
  CATEGORIES.forEach(c => byCat[c] = []);
  state.staff.forEach(s => {
    if (byCat[s.category]) byCat[s.category].push(s);
  });

  let rowIdx = 0;
  CATEGORIES.forEach(cat => {
    if (byCat[cat].length === 0) return;
    tbodyHtml += `<tr class="category-row"><td colspan="${days + 2}">${escapeHtml(cat)}</td></tr>`;
    byCat[cat].forEach(s => {
      orderedStaffCache.push(s);
      tbodyHtml += renderStaffRow(s, rowIdx, days, ym, md);
      rowIdx++;
    });
  });

  if (state.staff.length === 0) {
    tbodyHtml += `<tr><td colspan="${days + 2}" style="padding:30px;text-align:center;color:#9CA3AF;">左の＋ボタンからスタッフを追加してください</td></tr>`;
  } else {
    // 出勤数集計行
    tbodyHtml += '<tr class="summary-row"><td class="name-col">出勤数</td>';
    for (let d = 1; d <= days; d++) {
      let count = 0;
      state.staff.forEach(s => {
        if (isOnSite(s.id, d)) count++;
      });
      const req = md.requiredStaff[d - 1] || 0;
      const under = req > 0 && count < req && isMonthGenerated();
      const dow = dayOfWeek(ym, d);
      const weekStart = (dow === 0 && d > 1) ? ' week-start' : '';
      tbodyHtml += `<td class="${under ? 'summary-under' : ''}${weekStart}">${count}</td>`;
    }
    tbodyHtml += '<td class="holiday-col">―</td></tr>';

    // 社員出勤数集計行
    tbodyHtml += '<tr class="summary-row summary-row-employee"><td class="name-col">うち社員</td>';
    for (let d = 1; d <= days; d++) {
      let count = 0;
      state.staff.forEach(s => {
        if (s.category === '社員' && isOnSite(s.id, d)) count++;
      });
      const reqEmp = state.minEmployees || 0;
      const under = reqEmp > 0 && count < reqEmp && isMonthGenerated();
      const borderline = reqEmp > 0 && count === reqEmp && isMonthGenerated();
      const dow = dayOfWeek(ym, d);
      const weekStart = (dow === 0 && d > 1) ? ' week-start' : '';
      let cls = '';
      if (under) cls = 'summary-under';
      else if (borderline) cls = 'summary-borderline';
      tbodyHtml += `<td class="${cls}${weekStart}">${count}</td>`;
    }
    tbodyHtml += '<td class="holiday-col">―</td></tr>';
  }

  tbodyHtml += '</tbody>';

  calendar.innerHTML = theadHtml + tbodyHtml;

  // イベントバインド
  bindCalendarEvents();
  updateSelectionUI();
}

function renderStaffRow(s, rowIndex, days, ym, md) {
  const group = state.groups.find(g => g.id === s.groupId);
  const tintClass = group ? `row-tint-${group.color}` : '';

  let html = `<tr class="${tintClass}" data-staff-id="${s.id}" data-row-index="${rowIndex}">`;
  html += `<td class="name-col">${escapeHtml(s.name)}</td>`;

  const isIC = s.category === 'ICスタッフ';
  for (let d = 1; d <= days; d++) {
    const type = getShift(s.id, d);
    const def = SHIFT_TYPES[type] || SHIFT_TYPES[''];
    const dow = dayOfWeek(ym, d);
    const weekStart = (dow === 0 && d > 1) ? ' week-start' : '';
    // ICスタッフの休みは希望休・通常休問わず赤字
    const icOffClass = (isIC && def.countAsHoliday) ? ' cell-ic-off' : '';
    html += `<td class="${weekStart}"><div class="cell ${def.class}${icOffClass}" data-staff-id="${s.id}" data-row-index="${rowIndex}" data-day="${d}">${def.text}</div></td>`;
  }

  // 月休日数表示: 実休数 / 規定休数（規定は編集可能）
  const expectedHoliday = s.holidayBase;
  const actualHoliday = countActualHolidays(s.id, days);
  // ぴったり以外（不足も超過も）を赤字強調
  const understaffed = actualHoliday !== expectedHoliday;

  const holidayCellHtml = `
    <div style="display:flex;align-items:center;justify-content:center;gap:2px;font-size:11px;font-weight:700;">
      <span class="holiday-display ${understaffed ? 'holiday-mismatch' : ''}" title="実休数 / 規定">${actualHoliday}</span>
      <span style="color:#9CA3AF;">/</span>
      <input type="number" class="holiday-base-input" data-staff-id="${s.id}" min="0" max="31" value="${expectedHoliday}" title="規定休日数（クリックで変更）">
    </div>
  `;
  html += `<td class="holiday-col">${holidayCellHtml}</td>`;
  html += '</tr>';
  return html;
}

function countActualHolidays(staffId, days) {
  let count = 0;
  for (let d = 1; d <= days; d++) {
    const type = getShift(staffId, d);
    if (SHIFT_TYPES[type] && SHIFT_TYPES[type].countAsHoliday) count++;
  }
  return count;
}

function bindCalendarEvents() {
  // セルのドラッグ選択 + クリック
  document.querySelectorAll('.cell[data-staff-id]').forEach(el => {
    el.addEventListener('mousedown', onCellMouseDown);
    el.addEventListener('mouseenter', onCellMouseEnter);
  });

  // 必要人数入力
  document.querySelectorAll('.req-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const day = parseInt(inp.dataset.day);
      const md = state.months[state.currentMonth];
      md.requiredStaff[day - 1] = parseInt(inp.value) || 0;
      saveState();
      renderCalendar();
      checkAndRenderViolations();
    });
  });

  // 月休日数の規定値（分母）編集
  document.querySelectorAll('.holiday-base-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const staffId = parseInt(inp.dataset.staffId);
      const staff = state.staff.find(s => s.id === staffId);
      if (!staff) return;
      const v = parseInt(inp.value);
      if (isNaN(v) || v < 0) { inp.value = staff.holidayBase; return; }
      staff.holidayBase = v;
      saveState();
      renderCalendar();
      renderSidebar();
      checkAndRenderViolations();
    });
  });
}

/* ===== ドラッグ選択ハンドラ ===== */
function onCellMouseDown(e) {
  if (e.button !== 0) return; // 左クリックのみ
  e.preventDefault();
  const cell = e.currentTarget;
  const row = parseInt(cell.dataset.rowIndex);
  const day = parseInt(cell.dataset.day);
  isDragging = true;
  dragStart = { row, day };
  dragEnd = { row, day };
  selectedCells.clear();
  selectedCells.add(`${row}_${day}`);
  updateSelectionUI();
}

function onCellMouseEnter(e) {
  if (!isDragging) return;
  const cell = e.currentTarget;
  dragEnd = {
    row: parseInt(cell.dataset.rowIndex),
    day: parseInt(cell.dataset.day),
  };
  updateSelectionFromDrag();
}

function onDocumentMouseUp(e) {
  if (!isDragging) return;
  isDragging = false;

  const wasSingleClick = dragStart && dragEnd &&
    dragStart.row === dragEnd.row && dragStart.day === dragEnd.day;

  if (currentMode !== null) {
    applyModeToSelection(wasSingleClick);
    clearSelection();
  } else if (wasSingleClick) {
    // モードなし＆単セル → ピッカー表示
    const cell = document.querySelector(`.cell[data-row-index="${dragStart.row}"][data-day="${dragStart.day}"]`);
    if (cell) {
      const staff = orderedStaffCache[dragStart.row];
      if (staff) openCellPicker(cell, staff.id, dragStart.day);
    }
    clearSelection();
  }
  // 複数セル選択&モードなし → 選択状態保持（Delete待ち）
  dragStart = null;
  dragEnd = null;
}

function updateSelectionFromDrag() {
  if (!dragStart || !dragEnd) return;
  selectedCells.clear();
  const r1 = Math.min(dragStart.row, dragEnd.row);
  const r2 = Math.max(dragStart.row, dragEnd.row);
  const d1 = Math.min(dragStart.day, dragEnd.day);
  const d2 = Math.max(dragStart.day, dragEnd.day);
  for (let r = r1; r <= r2; r++) {
    for (let d = d1; d <= d2; d++) {
      selectedCells.add(`${r}_${d}`);
    }
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  document.querySelectorAll('.cell.cell-selected').forEach(el => el.classList.remove('cell-selected'));
  selectedCells.forEach(key => {
    const [row, day] = key.split('_');
    const el = document.querySelector(`.cell[data-row-index="${row}"][data-day="${day}"]`);
    if (el) el.classList.add('cell-selected');
  });
}

function clearSelection() {
  selectedCells.clear();
  updateSelectionUI();
}

function applyModeToSelection(isSingleClick) {
  if (isSingleClick) {
    // 単セルクリック：トグル動作
    const key = Array.from(selectedCells)[0];
    if (!key) return;
    const [row, day] = key.split('_').map(Number);
    const staff = orderedStaffCache[row];
    if (!staff) return;
    const current = getShift(staff.id, day);
    if (current === currentMode) {
      // 同じ属性 → 消去
      setShift(staff.id, day, '');
    } else {
      setShift(staff.id, day, currentMode);
    }
  } else {
    // 複数セル：全部currentModeに上書き（消去モード=''なら全部クリア）
    selectedCells.forEach(key => {
      const [row, day] = key.split('_').map(Number);
      const staff = orderedStaffCache[row];
      if (!staff) return;
      setShift(staff.id, day, currentMode);
    });
  }
  saveState();
  renderCalendar();
  checkAndRenderViolations();
}

/* ===== モード管理 ===== */
function setMode(mode) {
  if (currentMode === mode) {
    currentMode = null; // 同じモードを再クリック → 解除
  } else {
    currentMode = mode;
  }
  clearSelection();
  updateModeBar();
  renderLegend();
}

function updateModeBar() {
  const bar = document.getElementById('mode-bar');
  if (currentMode === null) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  let label, hint;
  if (currentMode === '') {
    label = '消去';
    hint = 'クリックでセル消去・ドラッグで範囲一括消去';
  } else {
    const def = SHIFT_TYPES[currentMode];
    label = def.label;
    hint = `クリックで「${def.label}」入力・同じセル再クリックで消去・ドラッグで範囲一括入力`;
  }
  bar.innerHTML = `
    <span class="mode-bar-label">📝 入力モード: ${escapeHtml(label)}</span>
    <span class="mode-bar-hint">${escapeHtml(hint)}</span>
    <button class="mode-bar-exit" id="exit-mode-btn">解除 (ESC)</button>
  `;
  document.getElementById('exit-mode-btn').addEventListener('click', () => setMode(null));
}

/* ===== 凡例描画（モード切替UI） ===== */
function renderLegend() {
  const legend = document.getElementById('legend');
  const modes = [
    { mode: 'work',     label: '出勤',         color: '#DBEAFE', borderStyle: '' },
    { mode: 'off',      label: '休み',         color: '#FFFFFF', borderStyle: '' },
    { mode: 'holiday',  label: '希望休（確定）', color: '#FCE7F3', borderStyle: '' },
    { mode: 'required', label: '必須出勤（確定）', color: '#2563EB', borderStyle: '' },
    { mode: 'training', label: '研修',         color: '#FEF3C7', borderStyle: '' },
    { mode: '',         label: '消去',         color: '#FFFFFF', borderStyle: 'border:1px dashed #9CA3AF' },
  ];

  let html = '<span class="legend-hint">クリックで入力モード:</span>';
  modes.forEach(m => {
    const active = currentMode === m.mode;
    const swatch = `<span class="legend-swatch" style="background:${m.color};${m.borderStyle}"></span>`;
    html += `<button type="button" class="legend-item ${active ? 'active' : ''}" data-mode="${m.mode}">${swatch}${escapeHtml(m.label)}</button>`;
  });
  html += `<span class="legend-item legend-violation" style="margin-left:8px;"><span class="legend-swatch" style="background:#FFF;outline:2px solid #DC2626;outline-offset:-2px"></span>違反</span>`;
  legend.innerHTML = html;

  legend.querySelectorAll('.legend-item[data-mode]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      setMode(btn.dataset.mode);
    });
  });
}

/* ===== セル種別ピッカー ===== */
function openCellPicker(cellEl, staffId, day) {
  // 既存ピッカーを閉じる
  document.querySelectorAll('.cell-picker').forEach(p => p.remove());

  const current = getShift(staffId, day);
  const picker = document.createElement('div');
  picker.className = 'cell-picker';
  picker.innerHTML = `
    <button class="cell-picker-option" data-type=""><span class="cell-picker-swatch" style="background:#FFF"></span>未設定</button>
    <button class="cell-picker-option" data-type="work"><span class="cell-picker-swatch" style="background:#DBEAFE"></span>出勤</button>
    <button class="cell-picker-option" data-type="off"><span class="cell-picker-swatch" style="background:#FFF"></span>休み</button>
    <button class="cell-picker-option" data-type="holiday"><span class="cell-picker-swatch" style="background:#FCE7F3"></span>希望休 🔒</button>
    <button class="cell-picker-option" data-type="required"><span class="cell-picker-swatch" style="background:#2563EB"></span>必須出勤 🔒</button>
    <button class="cell-picker-option" data-type="training"><span class="cell-picker-swatch" style="background:#FEF3C7"></span>研修</button>
  `;

  document.body.appendChild(picker);

  const rect = cellEl.getBoundingClientRect();
  let top = rect.bottom + 4;
  let left = rect.left;
  // 画面外回避
  const ph = picker.offsetHeight;
  const pw = picker.offsetWidth;
  if (top + ph > window.innerHeight) top = rect.top - ph - 4;
  if (left + pw > window.innerWidth) left = window.innerWidth - pw - 8;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';

  // 現在の選択を強調
  picker.querySelectorAll('.cell-picker-option').forEach(btn => {
    if (btn.dataset.type === current) {
      btn.style.background = '#EFF6FF';
      btn.style.fontWeight = '700';
    }
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      setShift(staffId, day, btn.dataset.type);
      saveState();
      picker.remove();
      renderCalendar();
      checkAndRenderViolations();
    });
  });

  // 外クリックで閉じる
  setTimeout(() => {
    const handler = (e) => {
      if (!picker.contains(e.target)) {
        picker.remove();
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 0);
}

</script>
<script>
/* ===== 違反検出 ===== */
function detectViolations() {
  const violations = [];
  const ym = state.currentMonth;
  const days = daysInMonth(ym);
  const md = state.months[ym];

  // 1. 4連勤以上チェック（全員、isOnSiteベース）
  state.staff.forEach(s => {
    let streak = 0;
    let streakStart = 0;
    for (let d = 1; d <= days + 1; d++) {
      const isWork = d <= days && isOnSite(s.id, d);
      if (isWork) {
        if (streak === 0) streakStart = d;
        streak++;
      } else {
        if (streak >= 4) {
          violations.push({
            type: 'consecutive',
            staffId: s.id,
            staffName: s.name,
            days: range(streakStart, streakStart + streak - 1),
            message: `${s.name} ${streakStart}日〜${streakStart + streak - 1}日（${streak}連勤）`,
          });
        }
        streak = 0;
      }
    }
  });

  // 2. 週2休未満チェック（日〜土の暦週、月をまたぐ週は当月分のみで判定）
  state.staff.forEach(s => {
    // 各日が属する週の最初の日曜日を割り当て
    const weeks = {}; // key: 日付（日曜の日付、月外なら負/超過の仮想インデックス）, value: { workDays, offDays, days[] }
    for (let d = 1; d <= days; d++) {
      const dow = dayOfWeek(ym, d);
      const sundayDay = d - dow; // この週の日曜日（当月内かもしれないし負かも）
      const wkey = sundayDay; // 同月内
      if (!weeks[wkey]) weeks[wkey] = { holidays: 0, days: [] };
      const t = getShift(s.id, d);
      const def = SHIFT_TYPES[t];
      if (def && def.countAsHoliday) weeks[wkey].holidays++;
      weeks[wkey].days.push(d);
    }
    Object.keys(weeks).forEach(k => {
      const w = weeks[k];
      // 1週間まるごと当月にある週だけチェック（7日揃ってる）
      if (w.days.length < 7) return;
      if (w.holidays < 2) {
        violations.push({
          type: 'week_holiday',
          staffId: s.id,
          staffName: s.name,
          days: w.days,
          message: `${s.name} ${w.days[0]}日週（${w.holidays}日休 < 2日）`,
        });
      }
    });
  });

  // 3. 日別現場人数不足
  for (let d = 1; d <= days; d++) {
    const req = md.requiredStaff[d - 1] || 0;
    let onSite = 0;
    state.staff.forEach(s => {
      if (isOnSite(s.id, d)) onSite++;
    });
    if (req > 0 && onSite < req) {
      violations.push({
        type: 'understaffed',
        day: d,
        message: `${d}日 現場人数不足（必要${req}・実${onSite}）`,
      });
    }
    // 社員必要人数
    const reqEmp = state.minEmployees || 0;
    if (reqEmp > 0) {
      let onSiteEmp = 0;
      state.staff.forEach(s => {
        if (s.category === '社員' && isOnSite(s.id, d)) onSiteEmp++;
      });
      if (onSiteEmp < reqEmp) {
        violations.push({
          type: 'employee_short',
          day: d,
          message: `${d}日 社員不足（必要${reqEmp}・実${onSiteEmp}）`,
        });
      }
    }
  }

  // 4. 月休日数の不一致（不足＝出勤過多、超過＝出勤不足。どちらも違反）
  state.staff.forEach(s => {
    const expected = s.holidayBase;
    const actual = countActualHolidays(s.id, days);
    if (actual < expected) {
      violations.push({
        type: 'holiday_mismatch',
        staffId: s.id,
        staffName: s.name,
        message: `${s.name} 月休日数不足 ${actual} < 規定 ${expected}（出勤数が規定より多い）`,
      });
    } else if (actual > expected) {
      violations.push({
        type: 'holiday_mismatch',
        staffId: s.id,
        staffName: s.name,
        message: `${s.name} 月休日数超過 ${actual} > 規定 ${expected}（出勤数が規定より少ない）`,
      });
    }
  });

  // 4.5 固定休曜日なのに出勤
  state.staff.forEach(s => {
    const fixed = s.fixedOffDays || [];
    if (fixed.length === 0) return;
    for (let d = 1; d <= days; d++) {
      const w = dayOfWeek(state.currentMonth, d);
      if (!fixed.includes(w)) continue;
      const def = SHIFT_TYPES[getShift(s.id, d)];
      if (def && def.countAsWork) {
        violations.push({
          type: 'fixed_off_conflict',
          staffId: s.id,
          staffName: s.name,
          message: `${s.name} ${d}日(${'日月火水木金土'[w]}) 固定休曜日に出勤`,
        });
      }
    }
  });

  // 5. グループ同日休み
  state.groups.forEach(g => {
    const members = state.staff.filter(s => s.groupId === g.id);
    if (members.length < 2) return;
    for (let d = 1; d <= days; d++) {
      const offMembers = members.filter(s => {
        const t = getShift(s.id, d);
        const def = SHIFT_TYPES[t];
        return def && def.countAsHoliday;
      });
      if (offMembers.length >= 2) {
        violations.push({
          type: 'group_overlap',
          groupId: g.id,
          day: d,
          staffIds: offMembers.map(s => s.id),
          message: `グループ${g.name} 同日休 ${d}日（${offMembers.map(s => s.name).join('・')}）`,
        });
      }
    }
  });

  return violations;
}

function isWorkDay(staffId, day) {
  const t = getShift(staffId, day);
  const def = SHIFT_TYPES[t];
  return def && def.countAsWork;
}

function range(a, b) {
  const arr = [];
  for (let i = a; i <= b; i++) arr.push(i);
  return arr;
}

/* ===== 違反描画 ===== */
function checkAndRenderViolations() {
  const container = document.getElementById('violations');

  // 既存の赤枠を全クリア
  document.querySelectorAll('.cell.cell-violation').forEach(c => c.classList.remove('cell-violation'));
  document.querySelectorAll('.req-cell-violation').forEach(c => c.classList.remove('req-cell-violation'));

  // 生成前は違反非表示（パネルも赤枠も）
  if (!isMonthGenerated()) {
    container.classList.add('hidden');
    return;
  }

  const violations = detectViolations();
  const list = document.getElementById('violations-list');
  const header = document.getElementById('violations-header');

  if (violations.length === 0) {
    container.classList.add('hidden');
  } else {
    container.classList.remove('hidden');
    header.textContent = `⚠ 違反 ${violations.length}件`;
    list.innerHTML = violations.map(v =>
      `<div class="violation-item">${escapeHtml(v.message)}</div>`
    ).join('');
  }

  violations.forEach(v => {
    if (v.type === 'consecutive' && v.staffId && v.days) {
      v.days.forEach(d => {
        const el = document.querySelector(`.cell[data-staff-id="${v.staffId}"][data-day="${d}"]`);
        if (el) el.classList.add('cell-violation');
      });
    } else if (v.type === 'group_overlap' && v.day && v.staffIds) {
      v.staffIds.forEach(sid => {
        const el = document.querySelector(`.cell[data-staff-id="${sid}"][data-day="${v.day}"]`);
        if (el) el.classList.add('cell-violation');
      });
    } else if (v.type === 'week_holiday' && v.staffId && v.days) {
      v.days.forEach(d => {
        const el = document.querySelector(`.cell[data-staff-id="${v.staffId}"][data-day="${d}"]`);
        if (el) el.classList.add('cell-violation');
      });
    }
    // 'understaffed' は出勤数集計行で赤くなるだけ。必要人数行は触らない
  });
}

</script>
<script>
/* ===== シフト自動生成 ===== */
async function generateShifts() {
  const ym = state.currentMonth;
  const days = daysInMonth(ym);
  const md = state.months[ym];
  if (!md.requiredEmployee) md.requiredEmployee = new Array(days).fill(0);

  if (state.staff.length === 0) {
    showToast('スタッフを追加してください');
    return;
  }

  // ロック系セルのスナップショット
  const lockedSnapshot = {};
  state.staff.forEach(s => {
    for (let d = 1; d <= days; d++) {
      const t = getShift(s.id, d);
      const def = SHIFT_TYPES[t];
      if (def && (def.locked || t === 'training')) {
        lockedSnapshot[`${s.id}_${d}`] = t;
      }
    }
  });
  // ★固定休曜日もロック扱いで 'off' を配置（希望休等の明示セルが優先）
  state.staff.forEach(s => {
    const fixed = s.fixedOffDays || [];
    if (fixed.length === 0) return;
    for (let d = 1; d <= days; d++) {
      const key = `${s.id}_${d}`;
      if (!lockedSnapshot[key] && fixed.includes(dayOfWeek(ym, d))) {
        lockedSnapshot[key] = 'off';
      }
    }
  });

  // ローディング表示
  showLoading('シフト生成中…', '試行回数: 0 / 最少違反: -');

  // ブラウザのUIスレッドを開放しながら試行
  // ★違反ゼロのパターンが出るまで粘る。出たら即採用。
  //   上限（回数 or 時間）に達したら、それまでの最少違反パターンを採用。
  //   スコアは違反パネル（detectViolations）と完全に同一基準。
  let bestShifts = null;
  let bestScore = Infinity; // 違反の総数
  let bestAttempt = 0;

  const MAX_ATTEMPTS = 3000;
  const TIME_LIMIT_MS = 20000; // 20秒で打ち切り
  const BATCH_SIZE = 8;        // バッチごとに UI 更新
  const startTime = Date.now();
  let attempt = 0;

  for (attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    // バッチ毎にUIに制御を返す
    if (attempt % BATCH_SIZE === 1) {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(0);
      updateLoading('シフト生成中…（違反ゼロを探索）',
        `試行 ${attempt}回 / ${elapsed}秒  ●  最少違反: ${bestScore === Infinity ? '-' : bestScore}件（${bestAttempt}回目）`);
      await sleep(0);
    }

    // 試行開始：状態リセット → ロック書き戻し
    md.shifts = {};
    Object.keys(lockedSnapshot).forEach(k => { md.shifts[k] = lockedSnapshot[k]; });

    // 試行戦略を多様化（5パターン回す）
    const strategy = attempt % 5;
    runSingleGeneration(ym, days, md, strategy);

    // 違反パネルと同一基準でスコア化
    const score = detectViolations().length;

    if (score < bestScore) {
      bestScore = score;
      bestShifts = JSON.parse(JSON.stringify(md.shifts));
      bestAttempt = attempt;
    }

    // 違反ゼロ達成 → 即採用して終了
    if (bestScore === 0) break;
    // 時間切れ → 最少違反パターンを採用
    if (Date.now() - startTime > TIME_LIMIT_MS) break;
  }

  // ベスト結果を採用
  md.shifts = bestShifts;
  md.generated = true;
  saveState();
  hideLoading();
  renderAll();

  if (bestScore === 0) {
    showToast(`シフト生成完了：違反ゼロ達成！（${bestAttempt}回目の試行で発見）`);
  } else {
    const tried = Math.min(attempt, MAX_ATTEMPTS);
    showToast(`シフト生成完了：${tried}回試行しましたが違反ゼロは見つからず、最少の違反${bestScore}件のパターンを採用しました。内容は違反パネルで確認できます`, 6000);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showLoading(text, detail) {
  const el = document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent = text || '処理中…';
  document.getElementById('loading-detail').textContent = detail || '';
  el.classList.remove('hidden');
}
function updateLoading(text, detail) {
  document.getElementById('loading-text').textContent = text || '処理中…';
  document.getElementById('loading-detail').textContent = detail || '';
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

/* 単一試行：第1〜4パスを順次実行（規定休数達成は絶対、人数不足は最小化）
 * strategy: 0-4 の試行戦略番号（スタッフの並び順を変えて多様な解を探索）
 */
function runSingleGeneration(ym, days, md, strategy) {
  const targets = state.staff.slice();

  // 固定休曜日の判定（この 'off' は移動・スワップしてはいけない）
  const fixedOffMap = {};
  state.staff.forEach(st => {
    if (Array.isArray(st.fixedOffDays) && st.fixedOffDays.length > 0) {
      fixedOffMap[st.id] = new Set(st.fixedOffDays);
    }
  });
  function isFixedOffDay(staffId, day) {
    const set = fixedOffMap[staffId];
    return !!(set && set.has(dayOfWeek(ym, day)));
  }

  // ヘルパー：生成中の暫定出勤判定（未設定=出勤予定）
  function isOnSiteGen(staffId, day) {
    const t = md.shifts[`${staffId}_${day}`];
    if (!t) return true; // 未設定 = 出勤予定（生成中の暫定）
    const def = SHIFT_TYPES[t];
    return !!(def && def.countAsWork);
  }

  // ある日の現場人数（生成中）
  function countOnSiteGen(day, excludeStaffId) {
    let count = 0;
    state.staff.forEach(s => {
      if (s.id === excludeStaffId) return;
      if (isOnSiteGen(s.id, day)) count++;
    });
    return count;
  }

  function countEmployeesOnSiteGen(day, excludeStaffId) {
    let count = 0;
    state.staff.forEach(s => {
      if (s.id === excludeStaffId) return;
      if (s.category === '社員' && isOnSiteGen(s.id, day)) count++;
    });
    return count;
  }

  // 各対象スタッフについて: 必要な追加休数を計算
  const needOffMap = {};
  targets.forEach(s => {
    let lockedHolidays = 0;
    for (let d = 1; d <= days; d++) {
      const t = md.shifts[`${s.id}_${d}`];
      const def = SHIFT_TYPES[t];
      if (def && def.countAsHoliday) lockedHolidays++;
    }
    needOffMap[s.id] = Math.max(0, s.holidayBase - lockedHolidays);
  });

  // 共通：休み配置不可の理由（ロック・休系・研修・グループ被り）
  function canPlaceOffLoose(staffId, day) {
    const cur = md.shifts[`${staffId}_${day}`];
    if (cur) {
      const def = SHIFT_TYPES[cur];
      if (def && def.countAsHoliday) return false;
      if (def && def.locked) return false;
      if (cur === 'training') return false;
    }
    const staff = state.staff.find(s => s.id === staffId);
    if (staff.groupId != null) {
      const groupMates = state.staff.filter(s => s.groupId === staff.groupId && s.id !== staffId);
      for (const gm of groupMates) {
        const t = md.shifts[`${gm.id}_${day}`];
        const def = SHIFT_TYPES[t];
        if (def && def.countAsHoliday) return false;
      }
    }
    return true;
  }

  // strict: looseに加えて人数制約・社員制約をハードに守る
  function canPlaceOffStrict(staffId, day) {
    if (!canPlaceOffLoose(staffId, day)) return false;
    // 全体人数制約: 休ませた後の現場人数 >= 必要人数
    const req = md.requiredStaff[day - 1] || 0;
    const onSiteWithout = countOnSiteGen(day, staffId);
    if (onSiteWithout < req) return false;
    // 社員人数制約: 休ませる対象が社員なら、休ませた後の社員出勤数 >= 社員必要人数
    const staff = state.staff.find(s => s.id === staffId);
    if (staff.category === '社員') {
      const reqEmp = state.minEmployees || 0;
      const empWithout = countEmployeesOnSiteGen(day, staffId);
      if (empWithout < reqEmp) return false;
    }
    return true;
  }

  function getConsecutiveAround(staffId, day) {
    let before = 0;
    for (let d = day - 1; d >= 1; d--) {
      if (isWorkDayInShifts(staffId, d, md.shifts)) before++;
      else break;
    }
    let after = 0;
    for (let d = day + 1; d <= days; d++) {
      if (isWorkDayInShifts(staffId, d, md.shifts)) after++;
      else break;
    }
    return { before, after, total: before + 1 + after };
  }

  // 試行戦略によってスタッフ並び順を変える（局所最適解から脱出）
  let sortedTargets;
  switch (strategy) {
    case 0:
      // 残り休数多い順 + 同点ランダム
      sortedTargets = [...targets].sort((a, b) =>
        (needOffMap[b.id] - needOffMap[a.id]) || (Math.random() - 0.5));
      break;
    case 1:
      // 残り休数少ない順 + 同点ランダム
      sortedTargets = [...targets].sort((a, b) =>
        (needOffMap[a.id] - needOffMap[b.id]) || (Math.random() - 0.5));
      break;
    case 2:
      // 完全ランダム
      sortedTargets = [...targets].sort(() => Math.random() - 0.5);
      break;
    case 3:
      // グループ所属者を先に（制約厳しい人優先）
      sortedTargets = [...targets].sort((a, b) => {
        const ag = a.groupId != null ? 0 : 1;
        const bg = b.groupId != null ? 0 : 1;
        return (ag - bg) || (needOffMap[b.id] - needOffMap[a.id]) || (Math.random() - 0.5);
      });
      break;
    case 4:
      // 社員を先に（社員必要人数の制約厳しい）
      sortedTargets = [...targets].sort((a, b) => {
        const ae = a.category === '社員' ? 0 : 1;
        const be = b.category === '社員' ? 0 : 1;
        return (ae - be) || (needOffMap[b.id] - needOffMap[a.id]) || (Math.random() - 0.5);
      });
      break;
    default:
      sortedTargets = [...targets].sort(() => Math.random() - 0.5);
  }

  /* ===== 第一パス: strict（人数・社員制約を守って配置） ===== */
  for (const s of sortedTargets) {
    let remaining = needOffMap[s.id];
    if (remaining <= 0) continue;

    while (remaining > 0) {
      const candidates = [];
      for (let d = 1; d <= days; d++) {
        if (!canPlaceOffStrict(s.id, d)) continue;

        let score = 0;
        // 人数余裕度（プラスが大きい日を優先）
        const req = md.requiredStaff[d - 1] || 0;
        const onSite = countOnSiteGen(d, s.id);
        const slack = onSite - req;
        score += slack * 5;

        // 4連勤回避
        const consec = getConsecutiveAround(s.id, d);
        if (consec.total >= 4) score += 1000;
        else if (consec.total === 3) score += 10;

        // 週2休未満なら強くプラス
        const weekHolidays = countWeekHolidays(s.id, d, days, ym, md.shifts);
        if (weekHolidays < 2) score += 30;

        // 試行ごとのばらつき用（強めの乱数）
        score += Math.random() * 3;
        candidates.push({ day: d, score });
      }
      if (candidates.length === 0) break;
      candidates.sort((a, b) => b.score - a.score);
      md.shifts[`${s.id}_${candidates[0].day}`] = 'off';
      remaining--;
    }
  }

  /* ===== 第二パス: loose（人数余裕を優先しつつ規定休数達成） ===== */
  for (const s of sortedTargets) {
    while (true) {
      let placedHolidays = 0;
      for (let d = 1; d <= days; d++) {
        const t = md.shifts[`${s.id}_${d}`];
        const def = SHIFT_TYPES[t];
        if (def && def.countAsHoliday) placedHolidays++;
      }
      if (placedHolidays >= s.holidayBase) break;

      const candidates = [];
      for (let d = 1; d <= days; d++) {
        if (!canPlaceOffLoose(s.id, d)) continue;
        // 人数余裕度
        const req = md.requiredStaff[d - 1] || 0;
        const onSiteWithout = countOnSiteGen(d, s.id);
        const slack = onSiteWithout - req;
        // 社員余裕度
        let empSlack = 999;
        if (s.category === '社員') {
          const reqEmp = state.minEmployees || 0;
          const empWithout = countEmployeesOnSiteGen(d, s.id);
          empSlack = empWithout - reqEmp;
        }
        const consec = getConsecutiveAround(s.id, d);
        candidates.push({ d, slack, empSlack, total: consec.total });
      }
      if (candidates.length === 0) break;
      // 1. 両方の余裕がプラス(=人数不足を作らない)を優先
      // 2. 余裕の最小値が大きい方優先
      // 3. 連勤が長いところ優先
      candidates.sort((a, b) => {
        const aMin = Math.min(a.slack, a.empSlack);
        const bMin = Math.min(b.slack, b.empSlack);
        // 両者ともプラスなら、連勤長 + 余裕 + 乱数で比較
        if (aMin >= 0 && bMin >= 0) {
          // スコアで比較（乱数大きめ）
          const aScore = a.total * 2 + aMin + Math.random() * 2;
          const bScore = b.total * 2 + bMin + Math.random() * 2;
          return bScore - aScore;
        }
        // プラス/マイナスの違いで優先
        return bMin - aMin;
      });
      md.shifts[`${s.id}_${candidates[0].d}`] = 'off';
    }

    // ★強制パス: それでも規定休数に届かない場合、グループ被りを許容してでも配置する
    // （出勤数=規定ぴったりを絶対優先。被りは違反パネルに表示される）
    let forcedCount = 0;
    for (let d = 1; d <= days; d++) {
      const t = md.shifts[`${s.id}_${d}`];
      const def = SHIFT_TYPES[t];
      if (def && def.countAsHoliday) forcedCount++;
    }
    while (forcedCount < s.holidayBase) {
      let placedDay = -1;
      let bestSlack = -Infinity;
      for (let d = 1; d <= days; d++) {
        const cur = md.shifts[`${s.id}_${d}`];
        if (cur) {
          const def = SHIFT_TYPES[cur];
          if (def && (def.countAsHoliday || def.locked)) continue;
          if (cur === 'training') continue;
        }
        // 人数余裕が最も大きい日を選ぶ（被害最小化）
        const slack = countOnSiteGen(d, s.id) - (md.requiredStaff[d - 1] || 0);
        if (slack > bestSlack) { bestSlack = slack; placedDay = d; }
      }
      if (placedDay === -1) break; // 希望休・研修等で全日埋まっており物理的に不可能
      md.shifts[`${s.id}_${placedDay}`] = 'off';
      forcedCount++;
    }
  }

  /* ===== 第三パス: 4連勤修復 ===== */
  function findStreaks(staffId) {
    const streaks = [];
    let current = [];
    for (let d = 1; d <= days + 1; d++) {
      const isWork = d <= days && isWorkDayInShifts(staffId, d, md.shifts);
      if (isWork) current.push(d);
      else {
        if (current.length > 0) streaks.push(current);
        current = [];
      }
    }
    return streaks;
  }

  // 長い連勤（4日以上）の総日数。減れば改善とみなす
  function countLongStreakDays(staffId) {
    return findStreaks(staffId)
      .filter(st => st.length >= 4)
      .reduce((sum, st) => sum + st.length, 0);
  }

  // ★休数を増やさないため、「追加」ではなく既配置の 'off' を「移動」して解消する
  for (const s of targets) {
    let iter = 0;
    while (iter < 100) {
      const streaks = findStreaks(s.id);
      const longStreaks = streaks.filter(st => st.length >= 4);
      if (longStreaks.length === 0) break;
      longStreaks.sort((a, b) => b.length - a.length);
      const targetStreak = longStreaks[0];
      const center = Math.floor(targetStreak.length / 2);
      const tryOrder = [targetStreak[center]];
      for (let off = 1; off < targetStreak.length; off++) {
        const left = center - off;
        const right = center + off;
        if (left >= 0) tryOrder.push(targetStreak[left]);
        if (right < targetStreak.length) tryOrder.push(targetStreak[right]);
      }

      // 移動元候補: 自動配置された 'off'（希望休などロック休・固定休曜日は動かせない）
      const donorDays = [];
      for (let d2 = 1; d2 <= days; d2++) {
        if (md.shifts[`${s.id}_${d2}`] === 'off' && !isFixedOffDay(s.id, d2)) donorDays.push(d2);
      }

      const before = countLongStreakDays(s.id);
      let moved = false;
      outerMove: for (const d of tryOrder) {
        if (!canPlaceOffLoose(s.id, d)) continue;
        for (const d2 of donorDays) {
          if (d2 === d) continue;
          // 仮移動: d2 の off を d へ（d2 は未設定=出勤予定に戻す）
          delete md.shifts[`${s.id}_${d2}`];
          md.shifts[`${s.id}_${d}`] = 'off';
          if (countLongStreakDays(s.id) < before) { moved = true; break outerMove; }
          // 改善しなければ戻す
          delete md.shifts[`${s.id}_${d}`];
          md.shifts[`${s.id}_${d2}`] = 'off';
        }
      }
      if (!moved) break; // 移動では解消不能（休数厳守を優先し、連勤は許容）
      iter++;
    }
  }

  // 残り未設定セルを 'work' に確定（全カテゴリ）
  state.staff.forEach(s => {
    for (let d = 1; d <= days; d++) {
      const key = `${s.id}_${d}`;
      if (!md.shifts[key]) md.shifts[key] = 'work';
    }
  });

  /* ===== 第四パス: 人数不足修復スワップ（強化版） ===== */
  // 確定後の現場判定
  function isOnSiteAfter(staffId, day) {
    const t = md.shifts[`${staffId}_${day}`];
    if (!t) return false;
    const def = SHIFT_TYPES[t];
    return !!(def && def.countAsWork);
  }

  function countOnSiteAfter(day, excludeId) {
    let n = 0;
    state.staff.forEach(s => {
      if (s.id === excludeId) return;
      if (isOnSiteAfter(s.id, day)) n++;
    });
    return n;
  }

  function countEmpOnSiteAfter(day, excludeId) {
    let n = 0;
    state.staff.forEach(s => {
      if (s.id === excludeId) return;
      if (s.category === '社員' && isOnSiteAfter(s.id, day)) n++;
    });
    return n;
  }

  function findUnderstaffed() {
    for (let d = 1; d <= days; d++) {
      const req = md.requiredStaff[d - 1] || 0;
      if (req > 0) {
        const onSite = countOnSiteAfter(d, -1);
        if (onSite < req) return { day: d, type: 'total', shortage: req - onSite };
      }
      const reqEmp = state.minEmployees || 0;
      if (reqEmp > 0) {
        const onSiteEmp = countEmpOnSiteAfter(d, -1);
        if (onSiteEmp < reqEmp) return { day: d, type: 'employee', shortage: reqEmp - onSiteEmp };
      }
    }
    return null;
  }

  function createsConsecutive4(staffId) {
    let streak = 0;
    for (let d = 1; d <= days; d++) {
      if (isOnSiteAfter(staffId, d)) {
        streak++;
        if (streak >= 4) return true;
      } else streak = 0;
    }
    return false;
  }

  // 4連勤修復（第四パス後の後追い）
  function repairConsecutive4() {
    for (const s of targets) {
      let iter = 0;
      while (iter < 50) {
        // 連勤を見つける
        let streakStart = -1;
        let longestStreak = null;
        let longestLen = 0;
        let curStart = -1, curLen = 0;
        for (let d = 1; d <= days + 1; d++) {
          const isWork = d <= days && isOnSiteAfter(s.id, d);
          if (isWork) {
            if (curLen === 0) curStart = d;
            curLen++;
          } else {
            if (curLen > longestLen) {
              longestLen = curLen;
              streakStart = curStart;
            }
            curLen = 0;
          }
        }
        if (longestLen < 4) break;

        // 中央付近を休みに変える
        const center = streakStart + Math.floor(longestLen / 2);
        const tryDays = [center];
        for (let off = 1; off < longestLen; off++) {
          if (center - off >= streakStart) tryDays.push(center - off);
          if (center + off < streakStart + longestLen) tryDays.push(center + off);
        }
        // ★中央付近を休みに変え、代わりに既存の 'off' を1日出勤へ戻す（休数不変スワップ）
        function longStreakDaysAfter(staffId) {
          let total = 0, streak = 0;
          for (let dd = 1; dd <= days + 1; dd++) {
            const w = dd <= days && isOnSiteAfter(staffId, dd);
            if (w) streak++;
            else { if (streak >= 4) total += streak; streak = 0; }
          }
          return total;
        }
        const beforeTotal = longStreakDaysAfter(s.id);
        let placed = false;
        outerRepair: for (const d of tryDays) {
          const cur = md.shifts[`${s.id}_${d}`];
          if (cur !== 'work') continue; // 触れるのは確定出勤のみ
          // グループ被りチェック
          if (s.groupId != null) {
            const overlap = state.staff.some(other => {
              if (other.id === s.id || other.groupId !== s.groupId) return false;
              const t = md.shifts[`${other.id}_${d}`];
              const def = SHIFT_TYPES[t];
              return def && def.countAsHoliday;
            });
            if (overlap) continue;
          }
          // 移動元: 自動配置の 'off' を探してスワップ（固定休曜日は除外）
          for (let d2 = 1; d2 <= days; d2++) {
            if (d2 === d) continue;
            if (md.shifts[`${s.id}_${d2}`] !== 'off') continue;
            if (isFixedOffDay(s.id, d2)) continue;
            md.shifts[`${s.id}_${d}`] = 'off';
            md.shifts[`${s.id}_${d2}`] = 'work';
            if (longStreakDaysAfter(s.id) < beforeTotal) {
              placed = true;
              break outerRepair;
            }
            // 改善しなければ戻す
            md.shifts[`${s.id}_${d}`] = 'work';
            md.shifts[`${s.id}_${d2}`] = 'off';
          }
        }
        if (!placed) break;
        iter++;
      }
    }
  }

  let swapRound = 0;
  const MAX_ROUNDS = 5;
  while (swapRound < MAX_ROUNDS) {
    let totalSwaps = 0;
    let swapIter = 0;
    const MAX_SWAP = 2000;

    while (swapIter < MAX_SWAP) {
      const issue = findUnderstaffed();
      if (!issue) break;
      const { day, type } = issue;

      // その日 'off' のスタッフ（固定休曜日の人は出勤に変えられないので除外）
      const candidates = targets.filter(s => {
        if (md.shifts[`${s.id}_${day}`] !== 'off') return false;
        if (isFixedOffDay(s.id, day)) return false;
        if (type === 'employee' && s.category !== '社員') return false;
        return true;
      });
      if (candidates.length === 0) break;

      // 軽くランダム化
      candidates.sort(() => Math.random() - 0.5);

      let swapped = false;
      outer: for (const s of candidates) {
        // スワップ先 d2 の候補を構築（s が work の日）
        const d2Candidates = [];
        for (let d2 = 1; d2 <= days; d2++) {
          if (d2 === day) continue;
          if (md.shifts[`${s.id}_${d2}`] !== 'work') continue;

          // d2 で s を休ませた場合の余裕度を計算
          const req2 = md.requiredStaff[d2 - 1] || 0;
          const onSite2 = countOnSiteAfter(d2, s.id);
          const slack2 = onSite2 - req2;
          if (slack2 < 0) continue;

          // 社員制約
          if (s.category === '社員') {
            const reqEmp2 = state.minEmployees || 0;
            if (reqEmp2 > 0) {
              const onSiteEmp2 = countEmpOnSiteAfter(d2, s.id);
              if (onSiteEmp2 < reqEmp2) continue;
            }
          }

          // グループ被り
          if (s.groupId != null) {
            const overlap = state.staff.some(other => {
              if (other.id === s.id || other.groupId !== s.groupId) return false;
              const t = md.shifts[`${other.id}_${d2}`];
              const def = SHIFT_TYPES[t];
              return def && def.countAsHoliday;
            });
            if (overlap) continue;
          }

          d2Candidates.push({ d2, slack: slack2 });
        }

        // 余裕の多い日を優先
        d2Candidates.sort((a, b) => b.slack - a.slack || (Math.random() - 0.5));

        for (const { d2 } of d2Candidates) {
          // スワップ仮実行 → 4連勤チェック
          const oldA = md.shifts[`${s.id}_${day}`];
          const oldB = md.shifts[`${s.id}_${d2}`];
          md.shifts[`${s.id}_${day}`] = 'work';
          md.shifts[`${s.id}_${d2}`] = 'off';
          if (createsConsecutive4(s.id)) {
            md.shifts[`${s.id}_${day}`] = oldA;
            md.shifts[`${s.id}_${d2}`] = oldB;
            continue;
          }
          swapped = true;
          break outer;
        }
      }
      if (!swapped) break;
      swapIter++;
      totalSwaps++;
    }

    if (totalSwaps === 0) break; // 何も改善できなかったので終了

    // スワップで4連勤になった可能性 → 修復
    repairConsecutive4();
    swapRound++;
  }

  // 最終 4連勤修復（規定休数を下回らせない範囲で）
  repairConsecutive4();

  // 注: 規定休数達成が絶対優先のため、強制 off→work 変換は行わない。
  // 残った人数不足は違反パネルで表示される。
}

function isWorkDayInShifts(staffId, day, shifts) {
  const t = shifts[`${staffId}_${day}`];
  const def = SHIFT_TYPES[t || 'work'];
  if (!t) return true; // 未設定は仮想的に出勤
  return def && def.countAsWork;
}

function countWeekHolidays(staffId, refDay, days, ym, shifts) {
  // refDayを含む週（日〜土）の休数
  const dow = dayOfWeek(ym, refDay);
  const sundayDay = refDay - dow;
  let count = 0;
  for (let off = 0; off < 7; off++) {
    const d = sundayDay + off;
    if (d < 1 || d > days) continue;
    const t = shifts[`${staffId}_${d}`];
    const def = SHIFT_TYPES[t];
    if (def && def.countAsHoliday) count++;
  }
  return count;
}

</script>
<script>
/* ===== Excelテンプレート保存（IndexedDB） ===== */
// localStorage では容量制限（5-10MB）に当たりやすいので IndexedDB を使用
async function getStoredTemplate() {
  try {
    const db = await openHandleDB();
    return await new Promise((resolve) => {
      const tx = db.transaction(HANDLE_STORE, 'readonly');
      const req = tx.objectStore(HANDLE_STORE).get('excelTemplate');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch (e) {
    console.error('テンプレ取得失敗:', e);
    return null;
  }
}

async function storeTemplate(base64) {
  const db = await openHandleDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HANDLE_STORE, 'readwrite');
    tx.objectStore(HANDLE_STORE).put(base64, 'excelTemplate');
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function clearStoredTemplate() {
  try {
    const db = await openHandleDB();
    await new Promise((resolve) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).delete('excelTemplate');
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    });
  } catch (e) { console.error(e); }
}

// 旧データ：localStorage に残ってる場合は IndexedDB に移行
async function migrateTemplateIfNeeded() {
  try {
    const old = localStorage.getItem(STORAGE_TEMPLATE_KEY);
    if (old) {
      const existing = await getStoredTemplate();
      if (!existing) {
        await storeTemplate(old);
        console.log('テンプレを IndexedDB に移行しました');
      }
      localStorage.removeItem(STORAGE_TEMPLATE_KEY);
    }
  } catch (e) { console.error('テンプレ移行失敗:', e); }
}

async function exportToExcel() {
  try {
    await ensureJSZip();
  } catch (e) {
    showToast(e.message);
    return;
  }

  const tplBase64 = await getStoredTemplate();
  if (!tplBase64) {
    openTemplateUploadModal();
    return;
  }

  generateExcelFromTemplate(tplBase64);
}

function openTemplateUploadModal() {
  showModal(`
    <div class="modal-title">Excelテンプレートを登録</div>
    <div style="margin-bottom:16px;font-size:13px;color:#374151;line-height:1.6;">
      初回のみ、課長に提出する形式のExcelファイル（雛形）をアップロードしてください。<br>
      テンプレートはブラウザに保存され、次回以降は自動で使われます。
    </div>
    <div class="form-row">
      <input type="file" id="tpl-file" accept=".xlsx" class="form-input">
    </div>
    <div class="modal-actions">
      <div></div>
      <div class="modal-actions-right">
        <button class="btn btn-secondary" id="tpl-cancel">キャンセル</button>
        <button class="btn btn-primary" id="tpl-save">登録</button>
      </div>
    </div>
  `);
  document.getElementById('tpl-cancel').addEventListener('click', closeModal);
  document.getElementById('tpl-save').addEventListener('click', () => {
    const file = document.getElementById('tpl-file').files[0];
    if (!file) { showToast('ファイルを選択してください'); return; }
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        await storeTemplate(base64);
        closeModal();
        showToast('テンプレートを保存しました');
        generateExcelFromTemplate(base64);
      } catch (err) {
        console.error(err);
        showToast('テンプレ保存失敗: ' + err.message);
      }
    };
    reader.readAsDataURL(file);
  });
}

/* ===== Excel出力（XML直接編集方式・テンプレ完全保持） =====
 * テンプレxlsxをZIPとして開き、セルの「値」だけをXMLレベルで書き換える。
 * スタイル・罫線・列幅・行高・結合セル・印刷設定には一切触れないため、
 * 出力はテンプレと完全に同じ見た目になる。
 * 赤字（希望休）とグループ色のみ、styles.xml に「元スタイルの複製＋色差し替え」を
 * 追加して適用する（元スタイルの罫線等はそのまま引き継がれる）。 */
let jszipLoading = null;
function ensureJSZip() {
  if (window.JSZip) return Promise.resolve();
  if (jszipLoading) return jszipLoading;
  jszipLoading = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
    script.onload = () => resolve();
    script.onerror = () => {
      jszipLoading = null;
      reject(new Error('JSZipの読み込みに失敗しました（ネットワーク接続を確認してください）'));
    };
    document.head.appendChild(script);
  });
  return jszipLoading;
}

/* --- 純粋関数群（XML文字列操作） --- */
function xlsxColLetter(c0) {
  let s = '', n = c0;
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}
function xlsxColIndex(letters) {
  let n = 0;
  for (const ch of letters) n = n * 26 + (ch.charCodeAt(0) - 64);
  return n - 1;
}
function xlsxRefParts(ref) {
  const m = ref.match(/^([A-Z]+)(\d+)$/);
  return { col: xlsxColIndex(m[1]), row: parseInt(m[2]) };
}
function xlsxEscape(v) {
  return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// workbook.xml と rels から最初のシートのパスを解決
function xlsxResolveSheetPath(workbookXml, relsXml) {
  let target = 'worksheets/sheet1.xml';
  const sheetM = workbookXml.match(/<sheet\b[^>]*?\/>/) || workbookXml.match(/<sheet\b[^>]*?>/);
  const ridM = sheetM && sheetM[0].match(/r:id="([^"]+)"/);
  if (ridM) {
    const relRe = new RegExp('<Relationship\\b[^>]*Id="' + ridM[1] + '"[^>]*?/>');
    const relM = relsXml.match(relRe);
    const tM = relM && relM[0].match(/Target="([^"]+)"/);
    if (tM) target = tM[1];
  }
  target = target.replace(/^\//, '');
  return target.startsWith('xl/') ? target : 'xl/' + target;
}

// styles.xml エディタ: 元スタイルを複製して色だけ差し替えたバリアントを追加する
function createXlsxStyleEditor(stylesXml) {
  let xml = stylesXml;
  const variantCache = {};

  function section(tag) {
    const re = new RegExp('(<' + tag + '\\b[^>]*>)([\\s\\S]*?)(</' + tag + '>)');
    const m = xml.match(re);
    return m ? { full: m[0], open: m[1], inner: m[2], close: m[3] } : null;
  }
  function elems(inner, childTag) {
    const re = new RegExp('<' + childTag + '\\b[^>]*/>|<' + childTag + '\\b[^>]*>[\\s\\S]*?</' + childTag + '>', 'g');
    return inner.match(re) || [];
  }
  function appendChild(sectionTag, childTag, childXml) {
    const sec = section(sectionTag);
    if (!sec) throw new Error('styles.xml に <' + sectionTag + '> がありません');
    const list = elems(sec.inner, childTag);
    let open = sec.open;
    if (/count="\d+"/.test(open)) open = open.replace(/count="\d+"/, 'count="' + (list.length + 1) + '"');
    xml = xml.replace(sec.full, () => open + sec.inner + childXml + sec.close);
    return list.length; // 新要素のインデックス
  }
  function getElem(sectionTag, childTag, idx) {
    const sec = section(sectionTag);
    if (!sec) return null;
    return elems(sec.inner, childTag)[idx] || null;
  }
  function ensureXfAttr(xf, name, val) {
    const re = new RegExp(name + '="[^"]*"');
    if (re.test(xf)) return xf.replace(re, name + '="' + val + '"');
    return xf.replace(/<xf\b/, '<xf ' + name + '="' + val + '"');
  }

  function fontVariant(fontId, rgb) {
    let font = getElem('fonts', 'font', fontId) || '<font/>';
    if (/\/>$/.test(font)) font = font.replace(/\/>$/, '></font>');
    font = font.replace(/<color\b[^>]*\/>/g, '');
    font = font.replace(/(<font\b[^>]*>)/, '$1<color rgb="' + rgb + '"/>');
    return appendChild('fonts', 'font', font);
  }
  function fillVariant(rgb) {
    return appendChild('fills', 'fill',
      '<fill><patternFill patternType="solid"><fgColor rgb="' + rgb + '"/><bgColor indexed="64"/></patternFill></fill>');
  }

  // 元のスタイルidxを複製し、フォント色/塗りだけ差し替えた新スタイルidxを返す
  function variant(origIdx, fontRgb, fillRgb) {
    const key = origIdx + '|' + (fontRgb || '') + '|' + (fillRgb || '');
    if (variantCache[key] != null) return variantCache[key];
    let xf = getElem('cellXfs', 'xf', origIdx)
      || '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>';
    if (fontRgb) {
      const fm = xf.match(/fontId="(\d+)"/);
      const newFontId = fontVariant(fm ? parseInt(fm[1]) : 0, fontRgb);
      xf = fm ? xf.replace(/fontId="\d+"/, 'fontId="' + newFontId + '"')
              : xf.replace(/<xf\b/, '<xf fontId="' + newFontId + '"');
      xf = ensureXfAttr(xf, 'applyFont', '1');
    }
    if (fillRgb) {
      const newFillId = fillVariant(fillRgb);
      xf = /fillId="\d+"/.test(xf) ? xf.replace(/fillId="\d+"/, 'fillId="' + newFillId + '"')
                                   : xf.replace(/<xf\b/, '<xf fillId="' + newFillId + '"');
      xf = ensureXfAttr(xf, 'applyFill', '1');
    }
    const newIdx = appendChild('cellXfs', 'xf', xf);
    variantCache[key] = newIdx;
    return newIdx;
  }

  return { variant, output: () => xml };
}

// シートXMLから既存セルのスタイルidxを取得（セルなし=null）
function xlsxGetCellStyleIdx(sheetXml, ref) {
  const re = new RegExp('<c r="' + ref + '"[^>]*');
  const m = sheetXml.match(re);
  if (!m) return null;
  const sm = m[0].match(/ s="(\d+)"/);
  return sm ? parseInt(sm[1]) : 0;
}

function xlsxBuildCellXml(ref, spec) {
  const sAttr = (spec.styleIdx != null) ? ' s="' + spec.styleIdx + '"' : '';
  if (spec.dateSerial != null) {
    return '<c r="' + ref + '"' + sAttr + '><v>' + spec.dateSerial + '</v></c>';
  }
  const v = spec.value == null ? '' : String(spec.value);
  if (v === '') return '<c r="' + ref + '"' + sAttr + '/>';
  return '<c r="' + ref + '"' + sAttr + ' t="inlineStr"><is><t xml:space="preserve">' + xlsxEscape(v) + '</t></is></c>';
}

/* セル値の一括書き換え。既存セルは値だけ差し替え（s属性維持）、
 * 無いセル・行は正しい位置に挿入する。styleIdx未指定なら元スタイルを維持。 */
function xlsxSetCells(sheetXml, cellSpecs) {
  const byRow = {};
  Object.keys(cellSpecs).forEach(ref => {
    const { row } = xlsxRefParts(ref);
    (byRow[row] = byRow[row] || []).push(ref);
  });

  let xml = sheetXml;
  Object.keys(byRow).map(Number).sort((a, b) => a - b).forEach(rowNum => {
    const rowRe = new RegExp('<row r="' + rowNum + '"[^>]*/>|<row r="' + rowNum + '"[^>]*>[\\s\\S]*?</row>');
    const rowM = xml.match(rowRe);
    let rowXml;
    if (rowM) {
      rowXml = rowM[0];
      if (/\/>$/.test(rowXml)) rowXml = rowXml.replace(/\/>$/, '></row>');
    } else {
      rowXml = '<row r="' + rowNum + '"></row>';
    }

    byRow[rowNum].sort((a, b) => xlsxRefParts(a).col - xlsxRefParts(b).col).forEach(ref => {
      const spec = cellSpecs[ref];
      const cellRe = new RegExp('<c r="' + ref + '"[^>]*/>|<c r="' + ref + '"[^>]*>[\\s\\S]*?</c>');
      const cm = rowXml.match(cellRe);
      let styleIdx = spec.styleIdx;
      if (styleIdx === undefined) {
        if (cm) {
          const sm = cm[0].match(/ s="(\d+)"/);
          styleIdx = sm ? parseInt(sm[1]) : null;
        } else {
          styleIdx = null;
        }
      }
      const newCell = xlsxBuildCellXml(ref, { value: spec.value, dateSerial: spec.dateSerial, styleIdx });
      if (cm) {
        rowXml = rowXml.replace(cm[0], () => newCell);
      } else {
        const myCol = xlsxRefParts(ref).col;
        const cells = rowXml.match(/<c r="[A-Z]+\d+"[^>]*\/>|<c r="[A-Z]+\d+"[^>]*>[\s\S]*?<\/c>/g) || [];
        let inserted = false;
        for (const c of cells) {
          const cref = c.match(/r="([A-Z]+\d+)"/)[1];
          if (xlsxRefParts(cref).col > myCol) {
            rowXml = rowXml.replace(c, () => newCell + c);
            inserted = true;
            break;
          }
        }
        if (!inserted) rowXml = rowXml.replace(/<\/row>$/, () => newCell + '</row>');
      }
    });

    if (rowM) {
      xml = xml.replace(rowM[0], () => rowXml);
    } else {
      const rows = xml.match(/<row r="\d+"[^>]*(?:\/>|>)/g) || [];
      let insertBefore = null;
      for (const r of rows) {
        if (parseInt(r.match(/r="(\d+)"/)[1]) > rowNum) { insertBefore = r; break; }
      }
      if (insertBefore) xml = xml.replace(insertBefore, () => rowXml + insertBefore);
      else xml = xml.replace('</sheetData>', () => rowXml + '</sheetData>');
    }
  });
  return xml;
}

/* シフトデータからセル書き込み指定を組み立てる（純粋関数・テスト可能）
 * 戻り値: { 'B6': { value, fontRgb?, fillRgb? }, 'A2': { dateSerial }, ... } */
function buildExcelCellSpecs(year, month, days, orderedStaff, groups, getShiftFn) {
  const GROUP_FILL = { a: 'FFFFF7DC', b: 'FFE4F8EB', c: 'FFDBEAFE', d: 'FFEDE9FE' };
  const startRow = 6;      // 1-based
  const startDayCol = 5;   // E列（1-based）
  const MAX_ROWS = 20;

  const specs = {};
  // A2: 月日（テンプレの表示形式そのまま・シリアル値で書く）
  specs['A2'] = { dateSerial: Math.round((Date.UTC(year, month - 1, 1) - Date.UTC(1899, 11, 30)) / 86400000) };

  // 既存スタッフ行をクリア（値のみ空に・スタイル維持）
  for (let r = startRow; r < startRow + MAX_ROWS; r++) {
    specs['B' + r] = { value: '' };
    specs['C' + r] = { value: '' };
    specs['D' + r] = { value: '' };
    for (let dc = 0; dc < 31; dc++) {
      specs[xlsxColLetter(startDayCol - 2 + dc + 1) + r] = { value: '' };
    }
  }

  // スタッフ書き込み
  orderedStaff.slice(0, MAX_ROWS).forEach((s, idx) => {
    const rowNum = startRow + idx;
    const group = groups.find(g => g.id === s.groupId);
    const rowFill = group ? GROUP_FILL[group.color] : null;

    specs['B' + rowNum] = { value: s.name, fillRgb: rowFill || undefined };
    specs['C' + rowNum] = { value: formatTime(s.startHour, s.startMin), fillRgb: rowFill || undefined };
    specs['D' + rowNum] = { value: formatTime(s.endHour, s.endMin), fillRgb: rowFill || undefined };

    for (let d = 1; d <= days; d++) {
      const t = getShiftFn(s.id, d);
      const def = SHIFT_TYPES[t] || SHIFT_TYPES[''];
      const ref = xlsxColLetter(startDayCol - 1 + (d - 1) - 1 + 1) + rowNum;
      const spec = { value: def.excel || '' };
      // 希望休は赤字。ICスタッフは休みの種類を問わず赤字
      if (t === 'holiday' || (s.category === 'ICスタッフ' && def.countAsHoliday)) {
        spec.fontRgb = 'FFFF0000';
      }
      if (rowFill) spec.fillRgb = rowFill;
      specs[ref] = spec;
    }
  });

  return specs;
}

async function generateExcelFromTemplate(base64) {
  try {
    await ensureJSZip();
    const zip = await JSZip.loadAsync(base64, { base64: true });

    const workbookXml = await zip.file('xl/workbook.xml').async('string');
    const relsFile = zip.file('xl/_rels/workbook.xml.rels');
    const relsXml = relsFile ? await relsFile.async('string') : '';
    const sheetPath = xlsxResolveSheetPath(workbookXml, relsXml);
    const sheetFile = zip.file(sheetPath);
    if (!sheetFile) throw new Error('テンプレ内にシートが見つかりません: ' + sheetPath);
    let sheetXml = await sheetFile.async('string');
    let stylesXml = await zip.file('xl/styles.xml').async('string');

    const ym = state.currentMonth;
    const { year, month } = parseMonth(ym);
    const days = daysInMonth(ym);

    const orderedStaff = [];
    CATEGORIES.forEach(cat => {
      state.staff.filter(s => s.category === cat).forEach(s => orderedStaff.push(s));
    });
    if (orderedStaff.length > 20) {
      showToast('警告: テンプレは20人分。' + (orderedStaff.length - 20) + '人分は出力されません');
    }

    const specs = buildExcelCellSpecs(year, month, days, orderedStaff, state.groups, getShift);

    // 色指定のあるセルは「元スタイルの複製＋色差し替え」でスタイルidxを解決
    const styler = createXlsxStyleEditor(stylesXml);
    Object.keys(specs).forEach(ref => {
      const sp = specs[ref];
      if (sp.fontRgb || sp.fillRgb) {
        const orig = xlsxGetCellStyleIdx(sheetXml, ref);
        sp.styleIdx = styler.variant(orig == null ? 0 : orig, sp.fontRgb, sp.fillRgb);
      }
    });

    sheetXml = xlsxSetCells(sheetXml, specs);
    stylesXml = styler.output();

    zip.file(sheetPath, sheetXml);
    zip.file('xl/styles.xml', stylesXml);

    const blob = await zip.generateAsync({
      type: 'blob',
      compression: 'DEFLATE',
      mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'シフト' + year + '年' + month + '月.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast('Excelを出力しました（テンプレ書式を完全保持）');
  } catch (e) {
    console.error(e);
    showToast('Excel出力エラー: ' + e.message);
  }
}

  document.getElementById('st-reset-all').addEventListener('click', () => {
    closeModal();
    confirmDialog('スタッフ・グループ・全月のシフトを全削除します。元に戻せません。本当に実行しますか？', async () => {
      localStorage.removeItem(STORAGE_KEY);
      await clearHandleFromDB();
      location.reload();
    });
  });
}

/* ===== 月切り替え ===== */
function changeMonth(delta) {
  const { year, month } = parseMonth(state.currentMonth);
  let newM = month + delta;
  let newY = year;
  if (newM < 1) { newM = 12; newY--; }
  if (newM > 12) { newM = 1; newY++; }
  state.currentMonth = formatMonth(newY, newM);
  ensureMonthData(state.currentMonth);
  saveState();
  renderAll();
}

function copyPrevMonth() {
  const { year, month } = parseMonth(state.currentMonth);
  let prevM = month - 1;
  let prevY = year;
  if (prevM < 1) { prevM = 12; prevY--; }
  const prevKey = formatMonth(prevY, prevM);
  const prevData = state.months[prevKey];
  if (!prevData) {
    showToast('前月のデータがありません');
    return;
  }
  confirmDialog(`${prevY}年${prevM}月のシフトを今月にコピーします。\n（希望休・必須出勤・研修・有給はリセットされ、通常シフトのみコピーされます）`, () => {
    const md = state.months[state.currentMonth];
    const days = daysInMonth(state.currentMonth);
    md.shifts = {};
    // 通常出勤と休みのみコピー（ロック系・研修・有給はリセット）
    Object.keys(prevData.shifts).forEach(k => {
      const t = prevData.shifts[k];
      if (t === 'work' || t === 'off') {
        // 日数が違う場合は同じ日だけコピー
        const parts = k.split('_');
        const day = parseInt(parts[1]);
        if (day <= days) md.shifts[k] = t;
      }
    });
    // ★固定休曜日を持つスタッフ（ICスタッフ等）は日付コピーだと曜日がズレるため、
    //   曜日ベースで作り直す（固定曜日=休み、それ以外=出勤）
    state.staff.forEach(s => {
      const fixed = s.fixedOffDays || [];
      if (fixed.length === 0) return;
      for (let d = 1; d <= days; d++) {
        md.shifts[`${s.id}_${d}`] = fixed.includes(dayOfWeek(state.currentMonth, d)) ? 'off' : 'work';
      }
    });
    // 必要人数もコピー
    md.requiredStaff = prevData.requiredStaff.slice(0, days);
    while (md.requiredStaff.length < days) md.requiredStaff.push(0);
    saveState();
    renderAll();
    showToast('前月のシフトをコピーしました');
  });
}

</script>
<script>
/* ===== 一括必要人数設定 ===== */
function applyBulkRequired(scope) {
  const v = parseInt(document.getElementById('bulk-required').value);
  if (isNaN(v) || v < 0) { showToast('人数を入力してください'); return; }
  const ym = state.currentMonth;
  const days = daysInMonth(ym);
  const md = state.months[ym];
  const arr = md.requiredStaff;
  for (let d = 1; d <= days; d++) {
    const dow = dayOfWeek(ym, d);
    if (scope === 'all') arr[d - 1] = v;
    else if (scope === 'weekday' && dow >= 1 && dow <= 5) arr[d - 1] = v;
    else if (scope === 'weekend' && (dow === 0 || dow === 6)) arr[d - 1] = v;
  }
  saveState();
  renderCalendar();
  checkAndRenderViolations();
}

/* ===== 全描画 ===== */
function renderAll() {
  document.getElementById('month-label').textContent =
    `${parseMonth(state.currentMonth).year}年${parseMonth(state.currentMonth).month}月`;
  renderSidebar();
  renderLegend();
  renderCalendar();
  checkAndRenderViolations();
  updateModeBar();
  updateSyncStatus();
}

function updateSyncStatus() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (sharedFolderHandle && !sharedFolderNeedsReauth) {
    const savedInfo = hasUnsavedChanges
      ? ' <span style="color:#D97706;font-weight:700;">未保存の変更あり</span>'
      : (lastSavedAt ? ` 保存済 ${lastSavedAt.toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit' })}` : '');
    el.innerHTML = `<span style="color:${hasUnsavedChanges ? '#D97706' : '#059669'};">●</span> ${escapeHtml(sharedFolderName || '?')}${savedInfo}`;
    el.style.background = hasUnsavedChanges ? '#FFFBEB' : '#ECFDF5';
    el.style.borderColor = hasUnsavedChanges ? '#FCD34D' : '#A7F3D0';
    el.title = hasUnsavedChanges ? '未保存の変更があります（Ctrl+S で保存）' : 'クリックで設定を開く';
  } else if (sharedFolderHandle && sharedFolderNeedsReauth) {
    el.innerHTML = `<span style="color:#D97706;">⚠</span> 再承認待ち: ${escapeHtml(sharedFolderName || '?')}`;
    el.style.background = '#FEF3C7';
    el.style.borderColor = '#FCD34D';
    el.title = 'クリックして共有フォルダへのアクセスを再承認';
  } else {
    el.innerHTML = `<span style="color:#9CA3AF;">○</span> 未接続（このPCのみ）`;
    el.style.background = '#F9FAFB';
    el.style.borderColor = '#E5E7EB';
    el.title = 'クリックで設定を開く';
  }
  // 保存ボタンの未保存バッジも連動
  const badge = document.getElementById('save-badge');
  if (badge) badge.style.display = (sharedFolderHandle && hasUnsavedChanges) ? 'inline' : 'none';
}

/* ===== 初期化 ===== */
async function init() {
  loadState();

  // ヘッダーイベント
  document.getElementById('btn-prev-month').addEventListener('click', () => changeMonth(-1));
  document.getElementById('btn-next-month').addEventListener('click', () => changeMonth(1));
  document.getElementById('btn-copy-prev').addEventListener('click', copyPrevMonth);
  document.getElementById('btn-save').addEventListener('click', manualSave);
  document.getElementById('btn-export').addEventListener('click', exportToExcel);
  document.getElementById('btn-settings').addEventListener('click', openSettingsModal);
  document.getElementById('sync-status').addEventListener('click', async () => {
    // 同期未確立だが保留中のハンドルがある場合、許可要求してみる
    if (!isFileSystemAccessSupported()) {
      openSettingsModal();
      return;
    }
    if (sharedFolderHandle) {
      // 再承認フラグが立ってる、または queryPermission が granted でない場合は requestPermission を試す
      let needReauth = sharedFolderNeedsReauth;
      if (!needReauth) {
        try {
          const perm = await sharedFolderHandle.queryPermission({ mode: 'readwrite' });
          needReauth = (perm !== 'granted');
        } catch (e) {
          console.warn('queryPermission on click failed:', e);
          needReauth = true;
        }
      }
      if (needReauth) {
        const ok = await requestPendingPermission();
        if (ok) return;
      }
    }
    openSettingsModal();
  });
  document.getElementById('btn-generate').addEventListener('click', () => {
    if (state.staff.length === 0) {
      showToast('スタッフを追加してください');
      return;
    }
    confirmDialog(
      '現在のシフトを上書きして自動生成します。\n（希望休・必須出勤・研修は保持されます）',
      async () => {
        try {
          await generateShifts();
        } catch (e) {
          console.error(e);
          hideLoading();
          showToast('生成エラー: ' + e.message);
        }
      }
    );
  });

  // サイドバー追加ボタン
  document.getElementById('btn-add-staff').addEventListener('click', () => openStaffModal(null));
  document.getElementById('btn-add-group').addEventListener('click', () => openGroupModal(null));

  // 一括必要人数
  document.getElementById('btn-apply-bulk').addEventListener('click', () => applyBulkRequired('all'));
  document.getElementById('btn-apply-weekday').addEventListener('click', () => applyBulkRequired('weekday'));
  document.getElementById('btn-apply-weekend').addEventListener('click', () => applyBulkRequired('weekend'));

  // モーダル外クリックで閉じる
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });

  // ドラッグ選択の終了（ドキュメント全体）
  document.addEventListener('mouseup', onDocumentMouseUp);

  // キーボード
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
      e.preventDefault(); // ブラウザの「ページを保存」を抑止
      manualSave();
      return;
    }
    if (e.key === 'Escape') {
      // モード解除 → 選択クリア → モーダル → ピッカーの順で処理
      if (currentMode !== null) { setMode(null); return; }
      if (selectedCells.size > 0) { clearSelection(); return; }
      closeModal();
      document.querySelectorAll('.cell-picker').forEach(p => p.remove());
    } else if ((e.key === 'Delete' || e.key === 'Backspace') && selectedCells.size > 0) {
      // テキスト入力中なら無視
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
      e.preventDefault();
      selectedCells.forEach(key => {
        const [row, day] = key.split('_').map(Number);
        const staff = orderedStaffCache[row];
        if (!staff) return;
        setShift(staff.id, day, '');
      });
      saveState();
      clearSelection();
      renderCalendar();
      checkAndRenderViolations();
      showToast('選択範囲を消去しました');
    }
  });

  // 隠しコマンド: テンプレ再設定（ヘッダーロゴをShift+クリック）
  document.querySelector('.logo').addEventListener('click', (e) => {
    if (e.shiftKey) resetTemplate();
  });

  renderAll();

  // 旧テンプレデータを IndexedDB へ移行
  migrateTemplateIfNeeded();

  // 未保存の変更があるままタブを閉じようとしたら警告
  window.addEventListener('beforeunload', (e) => {
    if (sharedFolderHandle && hasUnsavedChanges) {
      e.preventDefault();
      e.returnValue = ''; // Chromium系で警告ダイアログを出すのに必要
    }
  });

  // 起動時：共有フォルダ選択画面を表示（前回フォルダへのワンクリック再接続付き）
  if (isFileSystemAccessSupported()) {
    showStartupFolderScreen().catch(e => console.error(e));
  }
}

document.addEventListener('DOMContentLoaded', init);

</script>
